# =============================================================================
# Helm Values: AWS EKS + X-Ray + CloudWatch Metrics V2 (Zeus) — SDK metrics path
# =============================================================================
#
# Differences from helm-values-xray.yaml:
#
# 1. NO spanmetrics connector
#    Spanmetrics requires 100% spans for accurate RED metrics. Since this cluster
#    samples traces at the SDK, spanmetrics-derived metrics would be inaccurate.
#    Instead, we rely on OTel SDK auto-instrumentation to emit RED metrics
#    directly (http.server.request.duration, rpc.server.duration, etc.).
#
# 2. CloudWatch Metrics V2 (Zeus) endpoint
#    Uses granite.amazonaws.com (matching the original helm-values-xray.yaml).
#    Requires cloudwatch:PutMetricData IAM action.
#
# 3. Trace sampling at SDK
#    OTEL_TRACES_SAMPLER=parentbased_traceidratio at 10%. SDK metrics still
#    flow at 100% (independent signal), so RED metrics stay accurate.
#
# 4. Both metrics destinations
#    Metrics fan out to local Prometheus (Grafana dashboards) AND CloudWatch V2.
#
# To change region: replace all occurrences of 'us-east-1' below.
# =============================================================================

# Apply trace sampling and metrics export to every component via the chart's
# default env list. The chart already wires OTEL_EXPORTER_OTLP_ENDPOINT, so we
# just add the sampler config.
default:
  envOverrides:
    - name: OTEL_TRACES_SAMPLER
      value: parentbased_traceidratio
    - name: OTEL_TRACES_SAMPLER_ARG
      value: "0.1"

opentelemetry-collector:
  serviceAccount:
    create: false
    name: otel-collector

  config:
    extensions:
      sigv4auth:
        region: us-east-1
        service: xray
      sigv4auth/xray-beta:
        region: us-west-2
        service: xray
      sigv4auth/metrics:
        region: us-east-1
        service: monitoring

    exporters:
      otlphttp/xray:
        endpoint: https://xray.us-east-1.amazonaws.com
        auth:
          authenticator: sigv4auth
      otlphttp/xray-beta:
        endpoint: https://xray-beta.us-west-2.amazonaws.com
        auth:
          authenticator: sigv4auth/xray-beta

      otlphttp/cloudwatch-metrics:
        endpoint: https://monitoring.us-east-1.amazonaws.com
        compression: gzip
        auth:
          authenticator: sigv4auth/metrics
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
        sending_queue:
          enabled: true

    processors:
      resourcedetection:
        detectors: [env, system, eks, ec2]
        ec2:
          tags:
            - ^aws:autoscaling:groupName$
            - ^eks:cluster-name$

      # Zeus compatibility: drop array-typed and blank-string attributes.
      transform/zeus:
        error_mode: ignore
        metric_statements:
          - context: datapoint
            statements:
              - replace_all_patterns(attributes, "value", "^$", "unknown")
          - context: resource
            statements:
              - replace_all_patterns(attributes, "value", "^$", "unknown")
              - delete_key(attributes, "host.ip") where attributes["host.ip"] != nil
              - delete_key(attributes, "host.mac") where attributes["host.mac"] != nil
              - delete_key(attributes, "process.command_args") where attributes["process.command_args"] != nil
              - delete_key(attributes, "aws.log.group.names") where attributes["aws.log.group.names"] != nil
              - delete_key(attributes, "aws.log.stream.names") where attributes["aws.log.stream.names"] != nil
              - delete_key(attributes, "aws.log.group.arns") where attributes["aws.log.group.arns"] != nil
              - delete_key(attributes, "aws.log.stream.arns") where attributes["aws.log.stream.arns"] != nil

    # spanmetrics connector removed — RED metrics now come from SDK directly.
    # Helm merges maps, so we must explicitly null out the chart default
    # `connectors.spanmetrics: {}` rather than relying on `connectors: {}`.
    connectors:
      spanmetrics: null

    service:
      extensions:
        - health_check
        - sigv4auth
        - sigv4auth/xray-beta
        - sigv4auth/metrics
        - k8s_observer
        - k8s_leader_elector/k8s_cluster
      pipelines:
        traces:
          exporters:
            - otlp/jaeger
            - debug
            - otlphttp/xray
            - otlphttp/xray-beta
        metrics:
          # Override receivers to drop `spanmetrics` (chart default includes it).
          receivers:
            - otlp
            - receiver_creator/metrics
            - hostmetrics
            - kubeletstats
            - k8s_cluster
          processors:
            - k8sattributes
            - memory_limiter
            - resourcedetection
            - resource
            - transform/zeus
            - batch
          exporters:
            - otlphttp/prometheus
            - debug
            - otlphttp/cloudwatch-metrics
