AWSTemplateFormatVersion: '2010-09-09'
Description: Multi-Platform Demo - Lambda payment processor behind API Gateway

Parameters:
  LambdaCodeBucket:
    Type: String
    Description: S3 bucket containing Lambda deployment package
  LambdaCodeKey:
    Type: String
    Default: lambda/payment_processor.zip
    Description: S3 key for Lambda deployment package

Resources:
  PaymentFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: otel-demo-payment-processor
      Runtime: python3.12
      Handler: payment_processor.handler
      Code:
        S3Bucket: !Ref LambdaCodeBucket
        S3Key: !Ref LambdaCodeKey
      Role: !ImportValue OtelDemoLambdaRoleArn
      Timeout: 30
      MemorySize: 256
      TracingConfig:
        Mode: Active
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !ImportValue OtelDemoOrdersTableName
          OTEL_SERVICE_NAME: multi-payment-processor
      Tags:
        - Key: Project
          Value: otel-demo

  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: otel-demo-multi-api
      ProtocolType: HTTP

  HttpApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: $default
      AutoDeploy: true

  PaymentIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt PaymentFunction.Arn
      PayloadFormatVersion: '2.0'

  PaymentRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: POST /payment
      Target: !Sub integrations/${PaymentIntegration}

  PaymentPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref PaymentFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*

Outputs:
  ApiGatewayUrl:
    Description: API Gateway URL
    Value: !GetAtt HttpApi.ApiEndpoint
    Export:
      Name: OtelDemoApiGatewayUrl
  PaymentEndpoint:
    Description: Payment processor endpoint
    Value: !Sub ${HttpApi.ApiEndpoint}/payment
    Export:
      Name: OtelDemoPaymentEndpoint
