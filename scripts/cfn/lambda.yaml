AWSTemplateFormatVersion: '2010-09-09'
Description: Multi-Platform Demo - Lambda payment processor behind REST API Gateway (X-Ray enabled)

Parameters:
  LambdaCodeBucket:
    Type: String
    Description: S3 bucket containing Lambda deployment package
  LambdaCodeKey:
    Type: String
    Default: lambda/payment_processor.zip
    Description: S3 key for Lambda deployment package

Resources:
  PaymentFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: otel-demo-payment-processor
      Runtime: python3.12
      Handler: payment_processor.handler
      Code:
        S3Bucket: !Ref LambdaCodeBucket
        S3Key: !Ref LambdaCodeKey
      Role: !ImportValue OtelDemoLambdaRoleArn
      Timeout: 30
      MemorySize: 256
      TracingConfig:
        Mode: Active
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !ImportValue OtelDemoOrdersTableName
          OTEL_SERVICE_NAME: multi-payment-processor
      Tags:
        - Key: Project
          Value: otel-demo

  # REST API Gateway (v1) with X-Ray tracing
  RestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: otel-demo-multi-api
      Description: REST API for multi-platform demo (X-Ray enabled)

  PaymentResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !GetAtt RestApi.RootResourceId
      PathPart: payment

  PaymentMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref PaymentResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${PaymentFunction.Arn}/invocations

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: PaymentMethod
    Properties:
      RestApiId: !Ref RestApi

  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref RestApi
      DeploymentId: !Ref ApiDeployment
      StageName: prod
      TracingEnabled: true

  PaymentPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref PaymentFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${RestApi}/*

Outputs:
  ApiGatewayUrl:
    Description: REST API Gateway URL
    Value: !Sub https://${RestApi}.execute-api.${AWS::Region}.amazonaws.com/prod
    Export:
      Name: OtelDemoApiGatewayUrl
  PaymentEndpoint:
    Description: Payment processor endpoint
    Value: !Sub https://${RestApi}.execute-api.${AWS::Region}.amazonaws.com/prod/payment
    Export:
      Name: OtelDemoPaymentEndpoint
