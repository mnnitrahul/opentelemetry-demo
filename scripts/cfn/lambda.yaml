AWSTemplateFormatVersion: '2010-09-09'
Description: Multi-Platform Demo - Lambda payment processor behind REST API Gateway (X-Ray enabled)

Parameters:
  LambdaCodeBucket:
    Type: String
    Description: S3 bucket containing Lambda deployment package
  LambdaCodeKey:
    Type: String
    Default: lambda/payment_processor.zip
    Description: S3 key for Lambda deployment package

Resources:
  PaymentFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: otel-demo-payment-processor
      Runtime: python3.12
      Handler: payment_processor.handler
      Code:
        S3Bucket: !Ref LambdaCodeBucket
        S3Key: !Ref LambdaCodeKey
      Role: !ImportValue OtelDemoLambdaRoleArn
      Timeout: 30
      MemorySize: 256
      TracingConfig:
        Mode: Active
      Layers:
        - arn:aws:lambda:us-east-1:615299751070:layer:AWSOpenTelemetryDistroPython:14
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !ImportValue OtelDemoOrdersTableName
          AWS_LAMBDA_EXEC_WRAPPER: /opt/otel-instrument
          OTEL_SERVICE_NAME: multi-payment-processor
      Tags:
        - Key: Project
          Value: otel-demo

  # REST API Gateway (v1) with X-Ray tracing
  RestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: otel-demo-multi-api
      Description: REST API for multi-platform demo (X-Ray enabled)

  PaymentResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !GetAtt RestApi.RootResourceId
      PathPart: payment

  PaymentMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref PaymentResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${PaymentFunction.Arn}/invocations

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: PaymentMethod
    Properties:
      RestApiId: !Ref RestApi

  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref RestApi
      DeploymentId: !Ref ApiDeployment
      StageName: prod
      TracingEnabled: true

  PaymentPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref PaymentFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${RestApi}/*


  # --- SQS Consumer Lambda ---
  SqsConsumerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: otel-demo-sqs-consumer
      Runtime: python3.12
      Handler: sqs_consumer.handler
      Code:
        S3Bucket: !Ref LambdaCodeBucket
        S3Key: !Ref LambdaCodeKey
      Role: !ImportValue OtelDemoLambdaRoleArn
      Timeout: 30
      MemorySize: 256
      TracingConfig:
        Mode: Active
      Layers:
        - arn:aws:lambda:us-east-1:615299751070:layer:AWSOpenTelemetryDistroPython:14
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !ImportValue OtelDemoOrdersTableName
          AWS_LAMBDA_EXEC_WRAPPER: /opt/otel-instrument
          OTEL_SERVICE_NAME: multi-sqs-consumer

  SqsEventSource:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !ImportValue OtelDemoOrderQueueArn
      FunctionName: !Ref SqsConsumerFunction
      BatchSize: 10
      Enabled: true

  # --- SNS Consumer Lambda ---
  SnsConsumerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: otel-demo-sns-consumer
      Runtime: python3.12
      Handler: sns_consumer.handler
      Code:
        S3Bucket: !Ref LambdaCodeBucket
        S3Key: !Ref LambdaCodeKey
      Role: !ImportValue OtelDemoLambdaRoleArn
      Timeout: 30
      MemorySize: 256
      TracingConfig:
        Mode: Active
      Layers:
        - arn:aws:lambda:us-east-1:615299751070:layer:AWSOpenTelemetryDistroPython:14
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !ImportValue OtelDemoOrdersTableName
          AWS_LAMBDA_EXEC_WRAPPER: /opt/otel-instrument
          OTEL_SERVICE_NAME: multi-sns-consumer

  SnsConsumerPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref SnsConsumerFunction
      Action: lambda:InvokeFunction
      Principal: sns.amazonaws.com
      SourceArn: !ImportValue OtelDemoOrderTopicArn

  SnsSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !ImportValue OtelDemoOrderTopicArn
      Protocol: lambda
      Endpoint: !GetAtt SnsConsumerFunction.Arn

  # --- Kinesis Consumer Lambda ---
  KinesisConsumerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: otel-demo-kinesis-consumer
      Runtime: python3.12
      Handler: kinesis_consumer.handler
      Code:
        S3Bucket: !Ref LambdaCodeBucket
        S3Key: !Ref LambdaCodeKey
      Role: !ImportValue OtelDemoLambdaRoleArn
      Timeout: 30
      MemorySize: 256
      TracingConfig:
        Mode: Active
      Layers:
        - arn:aws:lambda:us-east-1:615299751070:layer:AWSOpenTelemetryDistroPython:14
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !ImportValue OtelDemoOrdersTableName
          AWS_LAMBDA_EXEC_WRAPPER: /opt/otel-instrument
          OTEL_SERVICE_NAME: multi-kinesis-consumer

  KinesisEventSource:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !ImportValue OtelDemoOrderStreamArn
      FunctionName: !Ref KinesisConsumerFunction
      StartingPosition: LATEST
      BatchSize: 100
      Enabled: true

  # --- MSK Consumer Lambda ---
  MskConsumerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: otel-demo-msk-consumer
      Runtime: python3.12
      Handler: msk_consumer.handler
      Code:
        S3Bucket: !Ref LambdaCodeBucket
        S3Key: !Ref LambdaCodeKey
      Role: !ImportValue OtelDemoLambdaRoleArn
      Timeout: 60
      MemorySize: 256
      TracingConfig:
        Mode: Active
      Layers:
        - arn:aws:lambda:us-east-1:615299751070:layer:AWSOpenTelemetryDistroPython:14
      VpcConfig:
        SubnetIds:
          - !ImportValue OtelDemoPrivateSubnet1
          - !ImportValue OtelDemoPrivateSubnet2
        SecurityGroupIds:
          - !ImportValue OtelDemoLambdaSG
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !ImportValue OtelDemoOrdersTableName
          AWS_LAMBDA_EXEC_WRAPPER: /opt/otel-instrument
          OTEL_SERVICE_NAME: multi-msk-consumer

  MskEventSource:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !ImportValue OtelDemoMskClusterArn
      FunctionName: !Ref MskConsumerFunction
      Topics:
        - otel-demo-orders-msk
      StartingPosition: LATEST

Outputs:
  ApiGatewayUrl:
    Description: REST API Gateway URL
    Value: !Sub https://${RestApi}.execute-api.${AWS::Region}.amazonaws.com/prod
    Export:
      Name: OtelDemoApiGatewayUrl
  PaymentEndpoint:
    Description: Payment processor endpoint
    Value: !Sub https://${RestApi}.execute-api.${AWS::Region}.amazonaws.com/prod/payment
    Export:
      Name: OtelDemoPaymentEndpoint

