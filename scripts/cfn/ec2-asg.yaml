AWSTemplateFormatVersion: '2010-09-09'
Description: Multi-Platform Demo - EC2 ASG inventory service behind ALB

Parameters:
  InventoryImage:
    Type: String
    Description: ECR image URI for inventory-service
  OtelCollectorEndpoint:
    Type: String
    Default: ''
    Description: OTel Collector OTLP HTTP endpoint
  ValkeyAddr:
    Type: String
    Default: ''
    Description: ElastiCache Valkey endpoint
  S3BucketName:
    Type: String
    Default: ''
    Description: S3 bucket name
  Ec2Ami:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64

Resources:
  AlbSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ALB SG for inventory-service
      VpcId: !ImportValue OtelDemoVpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

  InstanceIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !ImportValue OtelDemoEc2InstanceSG
      IpProtocol: tcp
      FromPort: 8080
      ToPort: 8080
      SourceSecurityGroupId: !Ref AlbSG

  Alb:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: otel-demo-multi-ec2-alb
      Scheme: internet-facing
      Type: application
      Subnets:
        - !ImportValue OtelDemoPublicSubnet1
        - !ImportValue OtelDemoPublicSubnet2
      SecurityGroups:
        - !Ref AlbSG

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: otel-demo-inventory-tg
      Port: 8080
      Protocol: HTTP
      VpcId: !ImportValue OtelDemoVpcId
      TargetType: instance
      HealthCheckPath: /health
      HealthCheckIntervalSeconds: 30
      Matcher:
        HttpCode: '200'

  Listener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref Alb
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  LaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: otel-demo-multi-ec2-lt
      LaunchTemplateData:
        ImageId: !Ref Ec2Ami
        InstanceType: t3.small
        IamInstanceProfile:
          Arn: !ImportValue OtelDemoEc2InstanceProfileArn
        SecurityGroupIds:
          - !ImportValue OtelDemoEc2InstanceSG
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            set -euo pipefail
            dnf install -y docker
            systemctl enable docker && systemctl start docker
            ECR_REGISTRY=$(echo "${InventoryImage}" | cut -d/ -f1)
            aws ecr get-login-password --region ${AWS::Region} | docker login --username AWS --password-stdin ${!ECR_REGISTRY}
            docker pull ${InventoryImage}
            # Run X-Ray daemon sidecar
            docker run -d --restart always --name xray-daemon \
              -p 2000:2000/udp \
              public.ecr.aws/xray/aws-xray-daemon:latest
            # Run inventory service
            docker run -d --restart always --name inventory -p 8080:8080 \
              -e SERVICE_PORT=8080 \
              -e OTEL_SERVICE_NAME=multi-inventory-service \
              -e OTEL_EXPORTER_OTLP_ENDPOINT=${OtelCollectorEndpoint} \
              -e OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf \
              -e VALKEY_ADDR=${ValkeyAddr} \
              -e S3_BUCKET_NAME=${S3BucketName} \
              -e AWS_REGION=${AWS::Region} \
              ${InventoryImage}
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: otel-demo-multi-ec2
              - Key: Project
                Value: otel-demo

  ASG:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      VPCZoneIdentifier:
        - !ImportValue OtelDemoPublicSubnet1
        - !ImportValue OtelDemoPublicSubnet2
      LaunchTemplate:
        LaunchTemplateId: !Ref LaunchTemplate
        Version: !GetAtt LaunchTemplate.LatestVersionNumber
      MinSize: 1
      MaxSize: 2
      DesiredCapacity: 1
      TargetGroupARNs:
        - !Ref TargetGroup
      HealthCheckType: ELB
      HealthCheckGracePeriod: 300

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ec2/otel-demo-multi/inventory
      RetentionInDays: 7

Outputs:
  AlbDnsName:
    Description: EC2 ALB DNS
    Value: !GetAtt Alb.DNSName
    Export:
      Name: OtelDemoEc2AlbDns
  InventoryEndpoint:
    Description: Inventory service URL
    Value: !Sub http://${Alb.DNSName}
    Export:
      Name: OtelDemoInventoryEndpoint
