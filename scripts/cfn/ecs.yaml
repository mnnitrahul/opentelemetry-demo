AWSTemplateFormatVersion: '2010-09-09'
Description: Multi-Platform Demo - ECS order-processor service behind ALB

Parameters:
  OrderProcessorImage:
    Type: String
    Description: ECR image URI for order-processor
  PaymentEndpoint:
    Type: String
    Default: ''
    Description: Lambda payment processor API Gateway URL
  InventoryEndpoint:
    Type: String
    Default: ''
    Description: EC2 inventory service ALB URL
  OtelCollectorEndpoint:
    Type: String
    Default: ''
    Description: OTel Collector OTLP HTTP endpoint

Resources:
  EcsCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: otel-demo-multi-ecs

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/otel-demo-multi/order-processor
      RetentionInDays: 7

  AlbSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ALB SG for order-processor
      VpcId: !ImportValue OtelDemoVpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

  TaskSGIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !ImportValue OtelDemoEcsTaskSG
      IpProtocol: tcp
      FromPort: 8080
      ToPort: 8080
      SourceSecurityGroupId: !Ref AlbSG

  Alb:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: otel-demo-multi-ecs-alb
      Scheme: internet-facing
      Type: application
      Subnets:
        - !ImportValue OtelDemoPublicSubnet1
        - !ImportValue OtelDemoPublicSubnet2
      SecurityGroups:
        - !Ref AlbSG

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: otel-demo-order-proc-tg
      Port: 8080
      Protocol: HTTP
      VpcId: !ImportValue OtelDemoVpcId
      TargetType: ip
      HealthCheckPath: /health
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: '200'

  Listener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref Alb
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: otel-demo-order-processor
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      Cpu: '512'
      Memory: '1024'
      TaskRoleArn: !ImportValue OtelDemoEcsTaskRoleArn
      ExecutionRoleArn: !ImportValue OtelDemoEcsExecutionRoleArn
      ContainerDefinitions:
        - Name: order-processor
          Image: !Ref OrderProcessorImage
          Essential: true
          PortMappings:
            - ContainerPort: 8080
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs
          Environment:
            - Name: SERVICE_PORT
              Value: '8080'
            - Name: OTEL_SERVICE_NAME
              Value: multi-order-processor
            - Name: DYNAMODB_TABLE_NAME
              Value: !ImportValue OtelDemoOrdersTableName
            - Name: S3_BUCKET_NAME
              Value: !ImportValue OtelDemoAssetsBucketName
            - Name: PAYMENT_PROCESSOR_URL
              Value: !Ref PaymentEndpoint
            - Name: INVENTORY_SERVICE_URL
              Value: !Ref InventoryEndpoint
            - Name: AWS_REGION
              Value: !Ref AWS::Region
        - Name: xray-daemon
          Image: public.ecr.aws/xray/aws-xray-daemon:latest
          Essential: false
          PortMappings:
            - ContainerPort: 2000
              Protocol: udp
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: xray

  Service:
    Type: AWS::ECS::Service
    DependsOn: Listener
    Properties:
      ServiceName: order-processor
      Cluster: !Ref EcsCluster
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets:
            - !ImportValue OtelDemoPublicSubnet1
            - !ImportValue OtelDemoPublicSubnet2
          SecurityGroups:
            - !ImportValue OtelDemoEcsTaskSG
      LoadBalancers:
        - ContainerName: order-processor
          ContainerPort: 8080
          TargetGroupArn: !Ref TargetGroup

Outputs:
  AlbDnsName:
    Description: ECS ALB DNS
    Value: !GetAtt Alb.DNSName
    Export:
      Name: OtelDemoEcsAlbDns
  OrderProcessorEndpoint:
    Description: Order processor URL
    Value: !Sub http://${Alb.DNSName}/order
    Export:
      Name: OtelDemoOrderProcessorEndpoint
