AWSTemplateFormatVersion: '2010-09-09'
Description: Multi-Platform Demo - ECS Fargate with collector sidecar

Parameters:
  OrderProcessorImage:
    Type: String
  InventoryImage:
    Type: String
  OrderProcessorJavaImage:
    Type: String
    Default: ''
  OrderProcessorVertxImage:
    Type: String
    Default: ''
  PaymentEndpoint:
    Type: String
    Default: ''
  MskBootstrap:
    Type: String
    Default: ''

Resources:
  EcsCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: otel-demo-multi-ecs

  OrderLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/otel-demo-multi/order-processor
      RetentionInDays: 7

  InventoryLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/otel-demo-multi/inventory-service
      RetentionInDays: 7

  AlbSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ALB SG for ECS services
      VpcId: !ImportValue OtelDemoVpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

  TaskSGIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !ImportValue OtelDemoEcsTaskSG
      IpProtocol: tcp
      FromPort: 8080
      ToPort: 8080
      SourceSecurityGroupId: !Ref AlbSG

  Alb:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: otel-demo-multi-ecs-alb
      Scheme: internet-facing
      Type: application
      Subnets:
        - !ImportValue OtelDemoPublicSubnet1
        - !ImportValue OtelDemoPublicSubnet2
      SecurityGroups:
        - !Ref AlbSG

  OrderTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: otel-demo-order-proc-tg
      Port: 8080
      Protocol: HTTP
      VpcId: !ImportValue OtelDemoVpcId
      TargetType: ip
      HealthCheckPath: /health
      Matcher:
        HttpCode: '200'

  InventoryTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: otel-demo-inventory-ecs-tg
      Port: 8080
      Protocol: HTTP
      VpcId: !ImportValue OtelDemoVpcId
      TargetType: ip
      HealthCheckPath: /health
      Matcher:
        HttpCode: '200'

  Listener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref Alb
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref OrderTargetGroup

  InventoryListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref Listener
      Priority: 10
      Conditions:
        - Field: path-pattern
          Values: ["/inventory*"]
      Actions:
        - Type: forward
          TargetGroupArn: !Ref InventoryTargetGroup

  # --- Order Processor (app + collector sidecar) ---
  OrderTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: otel-demo-order-processor
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      Cpu: '512'
      Memory: '1024'
      TaskRoleArn: !ImportValue OtelDemoEcsTaskRoleArn
      ExecutionRoleArn: !ImportValue OtelDemoEcsExecutionRoleArn
      ContainerDefinitions:
        - Name: order-processor
          Image: !Ref OrderProcessorImage
          Essential: true
          PortMappings:
            - ContainerPort: 8080
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref OrderLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: app
          Environment:
            - Name: SERVICE_PORT
              Value: '8080'
            - Name: OTEL_SERVICE_NAME
              Value: multi-order-processor
            - Name: OTEL_EXPORTER_OTLP_ENDPOINT
              Value: http://localhost:4318
            - Name: OTEL_EXPORTER_OTLP_PROTOCOL
              Value: http/protobuf
            - Name: OTEL_PROPAGATORS
              Value: xray,tracecontext,baggage
            - Name: OTEL_PYTHON_EXCLUDED_URLS
              Value: "169.254.169.254,169.254.170.2"
            - Name: DYNAMODB_TABLE_NAME
              Value: !ImportValue OtelDemoOrdersTableName
            - Name: S3_BUCKET_NAME
              Value: !ImportValue OtelDemoAssetsBucketName
            - Name: PAYMENT_PROCESSOR_URL
              Value: !Ref PaymentEndpoint
            - Name: INVENTORY_SERVICE_URL
              Value: !Sub http://${Alb.DNSName}
            - Name: MSK_BOOTSTRAP
              Value: !Ref MskBootstrap
            - Name: SNS_TOPIC_ARN
              Value: !ImportValue OtelDemoOrderTopicArn
            - Name: SQS_QUEUE_URL
              Value: !ImportValue OtelDemoOrderQueueUrl
            - Name: KINESIS_STREAM_NAME
              Value: !ImportValue OtelDemoOrderStreamName
            - Name: AWS_REGION
              Value: !Ref AWS::Region
            - Name: PG_HOST
              Value: !ImportValue OtelDemoAuroraEndpoint
            - Name: PG_PORT
              Value: !ImportValue OtelDemoAuroraPort
            - Name: PG_USER
              Value: otelu
            - Name: PG_PASSWORD
              Value: otelpassword123
            - Name: PG_DATABASE
              Value: otel
        - Name: otel-collector
          Image: otel/opentelemetry-collector-contrib:latest
          Essential: false
          Command: ["--config", "env:OTEL_CONFIG"]
          PortMappings:
            - ContainerPort: 4318
            - ContainerPort: 4317
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref OrderLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: collector
          Environment:
            - Name: AWS_REGION
              Value: !Ref AWS::Region
            - Name: OTEL_CONFIG
              Value: |
                receivers:
                  otlp:
                    protocols:
                      http:
                        endpoint: 0.0.0.0:4318
                      grpc:
                        endpoint: 0.0.0.0:4317
                processors:
                  resourcedetection:
                    detectors: [env, ecs, ec2]
                    timeout: 5s
                    override: false
                extensions:
                  sigv4auth:
                    region: ${AWS_REGION}
                    service: xray
                exporters:
                  otlphttp/xray:
                    endpoint: https://xray.${AWS_REGION}.amazonaws.com
                    auth:
                      authenticator: sigv4auth
                  debug:
                    verbosity: basic
                service:
                  extensions: [sigv4auth]
                  pipelines:
                    traces:
                      receivers: [otlp]
                      processors: [resourcedetection]
                      exporters: [otlphttp/xray, debug]

  OrderService:
    Type: AWS::ECS::Service
    DependsOn: Listener
    Properties:
      ServiceName: order-processor
      Cluster: !Ref EcsCluster
      TaskDefinition: !Ref OrderTaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets:
            - !ImportValue OtelDemoPublicSubnet1
            - !ImportValue OtelDemoPublicSubnet2
          SecurityGroups:
            - !ImportValue OtelDemoEcsTaskSG
      LoadBalancers:
        - ContainerName: order-processor
          ContainerPort: 8080
          TargetGroupArn: !Ref OrderTargetGroup

  # --- Inventory Service (app + collector sidecar) ---
  InventoryTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: otel-demo-inventory-service
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      Cpu: '512'
      Memory: '1024'
      TaskRoleArn: !ImportValue OtelDemoEcsTaskRoleArn
      ExecutionRoleArn: !ImportValue OtelDemoEcsExecutionRoleArn
      ContainerDefinitions:
        - Name: inventory-service
          Image: !Ref InventoryImage
          Essential: true
          PortMappings:
            - ContainerPort: 8080
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref InventoryLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: app
          Environment:
            - Name: SERVICE_PORT
              Value: '8080'
            - Name: OTEL_SERVICE_NAME
              Value: multi-inventory-service
            - Name: OTEL_EXPORTER_OTLP_ENDPOINT
              Value: http://localhost:4318
            - Name: OTEL_EXPORTER_OTLP_PROTOCOL
              Value: http/protobuf
            - Name: OTEL_PROPAGATORS
              Value: xray,tracecontext,baggage
            - Name: OTEL_PYTHON_EXCLUDED_URLS
              Value: "169.254.169.254,169.254.170.2"
            - Name: VALKEY_ADDR
              Value: !ImportValue OtelDemoValkeyEndpoint
            - Name: S3_BUCKET_NAME
              Value: !ImportValue OtelDemoAssetsBucketName
            - Name: AWS_REGION
              Value: !Ref AWS::Region
        - Name: otel-collector
          Image: otel/opentelemetry-collector-contrib:latest
          Essential: false
          Command: ["--config", "env:OTEL_CONFIG"]
          PortMappings:
            - ContainerPort: 4318
            - ContainerPort: 4317
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref InventoryLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: collector
          Environment:
            - Name: AWS_REGION
              Value: !Ref AWS::Region
            - Name: OTEL_CONFIG
              Value: |
                receivers:
                  otlp:
                    protocols:
                      http:
                        endpoint: 0.0.0.0:4318
                      grpc:
                        endpoint: 0.0.0.0:4317
                processors:
                  resourcedetection:
                    detectors: [env, ecs, ec2]
                    timeout: 5s
                    override: false
                extensions:
                  sigv4auth:
                    region: ${AWS_REGION}
                    service: xray
                exporters:
                  otlphttp/xray:
                    endpoint: https://xray.${AWS_REGION}.amazonaws.com
                    auth:
                      authenticator: sigv4auth
                  debug:
                    verbosity: basic
                service:
                  extensions: [sigv4auth]
                  pipelines:
                    traces:
                      receivers: [otlp]
                      processors: [resourcedetection]
                      exporters: [otlphttp/xray, debug]

  InventoryService:
    Type: AWS::ECS::Service
    DependsOn: InventoryListenerRule
    Properties:
      ServiceName: inventory-service
      Cluster: !Ref EcsCluster
      TaskDefinition: !Ref InventoryTaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets:
            - !ImportValue OtelDemoPublicSubnet1
            - !ImportValue OtelDemoPublicSubnet2
          SecurityGroups:
            - !ImportValue OtelDemoEcsTaskSG
      LoadBalancers:
        - ContainerName: inventory-service
          ContainerPort: 8080
          TargetGroupArn: !Ref InventoryTargetGroup

  # --- Order Processor Java (app + collector sidecar) ---
  JavaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/otel-demo-multi/order-processor-java
      RetentionInDays: 7

  JavaTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: otel-demo-order-java-tg
      Port: 8080
      Protocol: HTTP
      VpcId: !ImportValue OtelDemoVpcId
      TargetType: ip
      HealthCheckPath: /health
      Matcher:
        HttpCode: '200'

  JavaListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref Listener
      Priority: 5
      Conditions:
        - Field: path-pattern
          Values: ["/order-java*"]
      Actions:
        - Type: forward
          TargetGroupArn: !Ref JavaTargetGroup

  JavaTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: otel-demo-order-processor-java
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      Cpu: '1024'
      Memory: '2048'
      TaskRoleArn: !ImportValue OtelDemoEcsTaskRoleArn
      ExecutionRoleArn: !ImportValue OtelDemoEcsExecutionRoleArn
      ContainerDefinitions:
        - Name: order-processor-java
          Image: !Ref OrderProcessorJavaImage
          Essential: true
          PortMappings:
            - ContainerPort: 8080
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref JavaLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: app
          Environment:
            - Name: SERVICE_PORT
              Value: '8080'
            - Name: OTEL_SERVICE_NAME
              Value: multi-order-processor-java
            - Name: OTEL_EXPORTER_OTLP_ENDPOINT
              Value: http://localhost:4318
            - Name: OTEL_EXPORTER_OTLP_PROTOCOL
              Value: http/protobuf
            - Name: OTEL_PROPAGATORS
              Value: xray,tracecontext,baggage
            - Name: OTEL_PYTHON_EXCLUDED_URLS
              Value: "169.254.169.254,169.254.170.2"
            - Name: DYNAMODB_TABLE_NAME
              Value: !ImportValue OtelDemoOrdersTableName
            - Name: S3_BUCKET_NAME
              Value: !ImportValue OtelDemoAssetsBucketName
            - Name: PAYMENT_PROCESSOR_URL
              Value: !Ref PaymentEndpoint
            - Name: INVENTORY_SERVICE_URL
              Value: !Sub http://${Alb.DNSName}
            - Name: MSK_BOOTSTRAP
              Value: !Ref MskBootstrap
            - Name: SNS_TOPIC_ARN
              Value: !ImportValue OtelDemoOrderTopicArn
            - Name: SQS_QUEUE_URL
              Value: !ImportValue OtelDemoOrderQueueUrl
            - Name: KINESIS_STREAM_NAME
              Value: !ImportValue OtelDemoOrderStreamName
            - Name: AWS_REGION
              Value: !Ref AWS::Region
            - Name: PG_HOST
              Value: !ImportValue OtelDemoAuroraEndpoint
            - Name: PG_PORT
              Value: !ImportValue OtelDemoAuroraPort
            - Name: PG_USER
              Value: otelu
            - Name: PG_PASSWORD
              Value: otelpassword123
            - Name: PG_DATABASE
              Value: otel
        - Name: otel-collector
          Image: otel/opentelemetry-collector-contrib:latest
          Essential: false
          Command: ["--config", "env:OTEL_CONFIG"]
          PortMappings:
            - ContainerPort: 4318
            - ContainerPort: 4317
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref JavaLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: collector
          Environment:
            - Name: AWS_REGION
              Value: !Ref AWS::Region
            - Name: OTEL_CONFIG
              Value: |
                receivers:
                  otlp:
                    protocols:
                      http:
                        endpoint: 0.0.0.0:4318
                      grpc:
                        endpoint: 0.0.0.0:4317
                processors:
                  resourcedetection:
                    detectors: [env, ecs, ec2]
                    timeout: 5s
                    override: false
                extensions:
                  sigv4auth:
                    region: ${AWS_REGION}
                    service: xray
                exporters:
                  otlphttp/xray:
                    endpoint: https://xray.${AWS_REGION}.amazonaws.com
                    auth:
                      authenticator: sigv4auth
                  debug:
                    verbosity: basic
                service:
                  extensions: [sigv4auth]
                  pipelines:
                    traces:
                      receivers: [otlp]
                      processors: [resourcedetection]
                      exporters: [otlphttp/xray, debug]
                    metrics:
                      receivers: [otlp]
                      exporters: [debug]
                    logs:
                      receivers: [otlp]
                      exporters: [debug]

  JavaService:
    Type: AWS::ECS::Service
    DependsOn: JavaListenerRule
    Properties:
      ServiceName: order-processor-java
      Cluster: !Ref EcsCluster
      TaskDefinition: !Ref JavaTaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets:
            - !ImportValue OtelDemoPublicSubnet1
            - !ImportValue OtelDemoPublicSubnet2
          SecurityGroups:
            - !ImportValue OtelDemoEcsTaskSG
      LoadBalancers:
        - ContainerName: order-processor-java
          ContainerPort: 8080
          TargetGroupArn: !Ref JavaTargetGroup

  # --- Order Processor Vert.x (app + collector sidecar) ---
  VertxLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/otel-demo-multi/order-processor-vertx
      RetentionInDays: 7

  VertxTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: otel-demo-order-vertx-tg
      Port: 8080
      Protocol: HTTP
      VpcId: !ImportValue OtelDemoVpcId
      TargetType: ip
      HealthCheckPath: /health
      Matcher:
        HttpCode: '200'

  VertxListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref Listener
      Priority: 3
      Conditions:
        - Field: path-pattern
          Values: ["/order-vertx*"]
      Actions:
        - Type: forward
          TargetGroupArn: !Ref VertxTargetGroup

  VertxTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: otel-demo-order-processor-vertx
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      Cpu: '1024'
      Memory: '2048'
      TaskRoleArn: !ImportValue OtelDemoEcsTaskRoleArn
      ExecutionRoleArn: !ImportValue OtelDemoEcsExecutionRoleArn
      ContainerDefinitions:
        - Name: order-processor-vertx
          Image: !Ref OrderProcessorVertxImage
          Essential: true
          PortMappings:
            - ContainerPort: 8080
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref VertxLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: app
          Environment:
            - Name: SERVICE_PORT
              Value: '8080'
            - Name: OTEL_SERVICE_NAME
              Value: multi-order-processor-vertx
            - Name: OTEL_EXPORTER_OTLP_ENDPOINT
              Value: http://localhost:4318
            - Name: OTEL_EXPORTER_OTLP_PROTOCOL
              Value: http/protobuf
            - Name: OTEL_PROPAGATORS
              Value: xray,tracecontext,baggage
            - Name: DYNAMODB_TABLE_NAME
              Value: !ImportValue OtelDemoOrdersTableName
            - Name: S3_BUCKET_NAME
              Value: !ImportValue OtelDemoAssetsBucketName
            - Name: INVENTORY_SERVICE_URL
              Value: !Sub http://${Alb.DNSName}
            - Name: AWS_REGION
              Value: !Ref AWS::Region
            - Name: PG_HOST
              Value: !ImportValue OtelDemoAuroraEndpoint
            - Name: PG_PORT
              Value: !ImportValue OtelDemoAuroraPort
            - Name: PG_USER
              Value: otelu
            - Name: PG_PASSWORD
              Value: otelpassword123
            - Name: PG_DATABASE
              Value: otel
        - Name: otel-collector
          Image: otel/opentelemetry-collector-contrib:latest
          Essential: false
          Command: ["--config", "env:OTEL_CONFIG"]
          PortMappings:
            - ContainerPort: 4318
            - ContainerPort: 4317
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref VertxLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: collector
          Environment:
            - Name: AWS_REGION
              Value: !Ref AWS::Region
            - Name: OTEL_CONFIG
              Value: |
                receivers:
                  otlp:
                    protocols:
                      http:
                        endpoint: 0.0.0.0:4318
                      grpc:
                        endpoint: 0.0.0.0:4317
                processors:
                  resourcedetection:
                    detectors: [env, ecs, ec2]
                    timeout: 5s
                    override: false
                extensions:
                  sigv4auth:
                    region: ${AWS_REGION}
                    service: xray
                exporters:
                  otlphttp/xray:
                    endpoint: https://xray.${AWS_REGION}.amazonaws.com
                    auth:
                      authenticator: sigv4auth
                  debug:
                    verbosity: basic
                service:
                  extensions: [sigv4auth]
                  pipelines:
                    traces:
                      receivers: [otlp]
                      processors: [resourcedetection]
                      exporters: [otlphttp/xray, debug]
                    metrics:
                      receivers: [otlp]
                      exporters: [debug]
                    logs:
                      receivers: [otlp]
                      exporters: [debug]

  VertxService:
    Type: AWS::ECS::Service
    DependsOn: VertxListenerRule
    Properties:
      ServiceName: order-processor-vertx
      Cluster: !Ref EcsCluster
      TaskDefinition: !Ref VertxTaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets:
            - !ImportValue OtelDemoPublicSubnet1
            - !ImportValue OtelDemoPublicSubnet2
          SecurityGroups:
            - !ImportValue OtelDemoEcsTaskSG
      LoadBalancers:
        - ContainerName: order-processor-vertx
          ContainerPort: 8080
          TargetGroupArn: !Ref VertxTargetGroup

Outputs:
  AlbDnsName:
    Value: !GetAtt Alb.DNSName
    Export:
      Name: OtelDemoEcsAlbDns
  OrderProcessorEndpoint:
    Value: !Sub http://${Alb.DNSName}/order
    Export:
      Name: OtelDemoOrderProcessorEndpoint
  InventoryEndpoint:
    Value: !Sub http://${Alb.DNSName}/inventory
    Export:
      Name: OtelDemoInventoryEndpoint
  OrderProcessorJavaEndpoint:
    Value: !Sub http://${Alb.DNSName}/order-java
    Export:
      Name: OtelDemoOrderProcessorJavaEndpoint
