AWSTemplateFormatVersion: '2010-09-09'
Description: Multi-Platform Demo - ECS Fargate with order-processor and inventory-service

Parameters:
  OrderProcessorImage:
    Type: String
    Description: ECR image URI for order-processor
  InventoryImage:
    Type: String
    Description: ECR image URI for inventory-service
  PaymentEndpoint:
    Type: String
    Default: ''
  OtelCollectorEndpoint:
    Type: String
    Default: ''

Resources:
  EcsCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: otel-demo-multi-ecs

  OrderLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/otel-demo-multi/order-processor
      RetentionInDays: 7

  InventoryLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/otel-demo-multi/inventory-service
      RetentionInDays: 7

  AlbSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ALB SG for ECS services
      VpcId: !ImportValue OtelDemoVpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

  TaskSGIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !ImportValue OtelDemoEcsTaskSG
      IpProtocol: tcp
      FromPort: 8080
      ToPort: 8080
      SourceSecurityGroupId: !Ref AlbSG

  Alb:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: otel-demo-multi-ecs-alb
      Scheme: internet-facing
      Type: application
      Subnets:
        - !ImportValue OtelDemoPublicSubnet1
        - !ImportValue OtelDemoPublicSubnet2
      SecurityGroups:
        - !Ref AlbSG

  # --- Order Processor Target Group ---
  OrderTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: otel-demo-order-proc-tg
      Port: 8080
      Protocol: HTTP
      VpcId: !ImportValue OtelDemoVpcId
      TargetType: ip
      HealthCheckPath: /health
      HealthCheckIntervalSeconds: 30
      Matcher:
        HttpCode: '200'

  # --- Inventory Service Target Group ---
  InventoryTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: otel-demo-inventory-ecs-tg
      Port: 8080
      Protocol: HTTP
      VpcId: !ImportValue OtelDemoVpcId
      TargetType: ip
      HealthCheckPath: /health
      HealthCheckIntervalSeconds: 30
      Matcher:
        HttpCode: '200'

  # --- ALB Listener with path-based routing ---
  Listener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref Alb
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref OrderTargetGroup

  InventoryListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref Listener
      Priority: 10
      Conditions:
        - Field: path-pattern
          Values: ["/inventory*"]
      Actions:
        - Type: forward
          TargetGroupArn: !Ref InventoryTargetGroup

  # --- Order Processor Task ---
  OrderTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: otel-demo-order-processor
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      Cpu: '256'
      Memory: '512'
      TaskRoleArn: !ImportValue OtelDemoEcsTaskRoleArn
      ExecutionRoleArn: !ImportValue OtelDemoEcsExecutionRoleArn
      ContainerDefinitions:
        - Name: order-processor
          Image: !Ref OrderProcessorImage
          Essential: true
          PortMappings:
            - ContainerPort: 8080
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref OrderLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs
          Environment:
            - Name: SERVICE_PORT
              Value: '8080'
            - Name: OTEL_SERVICE_NAME
              Value: multi-order-processor
            - Name: OTEL_EXPORTER_OTLP_ENDPOINT
              Value: !Ref OtelCollectorEndpoint
            - Name: OTEL_EXPORTER_OTLP_PROTOCOL
              Value: http/protobuf
            - Name: DYNAMODB_TABLE_NAME
              Value: !ImportValue OtelDemoOrdersTableName
            - Name: S3_BUCKET_NAME
              Value: !ImportValue OtelDemoAssetsBucketName
            - Name: PAYMENT_PROCESSOR_URL
              Value: !Ref PaymentEndpoint
            - Name: INVENTORY_SERVICE_URL
              Value: !Sub http://${Alb.DNSName}
            - Name: AWS_REGION
              Value: !Ref AWS::Region

  OrderService:
    Type: AWS::ECS::Service
    DependsOn: Listener
    Properties:
      ServiceName: order-processor
      Cluster: !Ref EcsCluster
      TaskDefinition: !Ref OrderTaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets:
            - !ImportValue OtelDemoPublicSubnet1
            - !ImportValue OtelDemoPublicSubnet2
          SecurityGroups:
            - !ImportValue OtelDemoEcsTaskSG
      LoadBalancers:
        - ContainerName: order-processor
          ContainerPort: 8080
          TargetGroupArn: !Ref OrderTargetGroup

  # --- Inventory Service Task ---
  InventoryTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: otel-demo-inventory-service
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      Cpu: '256'
      Memory: '512'
      TaskRoleArn: !ImportValue OtelDemoEcsTaskRoleArn
      ExecutionRoleArn: !ImportValue OtelDemoEcsExecutionRoleArn
      ContainerDefinitions:
        - Name: inventory-service
          Image: !Ref InventoryImage
          Essential: true
          PortMappings:
            - ContainerPort: 8080
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref InventoryLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs
          Environment:
            - Name: SERVICE_PORT
              Value: '8080'
            - Name: OTEL_SERVICE_NAME
              Value: multi-inventory-service
            - Name: OTEL_EXPORTER_OTLP_ENDPOINT
              Value: !Ref OtelCollectorEndpoint
            - Name: OTEL_EXPORTER_OTLP_PROTOCOL
              Value: http/protobuf
            - Name: VALKEY_ADDR
              Value: !ImportValue OtelDemoValkeyEndpoint
            - Name: S3_BUCKET_NAME
              Value: !ImportValue OtelDemoAssetsBucketName
            - Name: AWS_REGION
              Value: !Ref AWS::Region

  InventoryService:
    Type: AWS::ECS::Service
    DependsOn: InventoryListenerRule
    Properties:
      ServiceName: inventory-service
      Cluster: !Ref EcsCluster
      TaskDefinition: !Ref InventoryTaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets:
            - !ImportValue OtelDemoPublicSubnet1
            - !ImportValue OtelDemoPublicSubnet2
          SecurityGroups:
            - !ImportValue OtelDemoEcsTaskSG
      LoadBalancers:
        - ContainerName: inventory-service
          ContainerPort: 8080
          TargetGroupArn: !Ref InventoryTargetGroup

Outputs:
  AlbDnsName:
    Description: ECS ALB DNS
    Value: !GetAtt Alb.DNSName
    Export:
      Name: OtelDemoEcsAlbDns
  OrderProcessorEndpoint:
    Description: Order processor URL
    Value: !Sub http://${Alb.DNSName}/order
    Export:
      Name: OtelDemoOrderProcessorEndpoint
  InventoryEndpoint:
    Description: Inventory service URL
    Value: !Sub http://${Alb.DNSName}/inventory
    Export:
      Name: OtelDemoInventoryEndpoint
