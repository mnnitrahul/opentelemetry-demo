# =============================================================================
# Helm Values: AWS Customizations for OpenTelemetry Demo
# =============================================================================
#
# This file contains all customizations applied on top of the vanilla
# opentelemetry-demo Helm chart to support AWS EKS + X-Ray deployment.
#
# Customizations:
#
# 1. Service Account (IRSA)
#    - Disables Helm-managed SA creation
#    - Uses the 'otel-collector' SA created by eksctl with IRSA
#    - Provides AWS credentials to the collector pod automatically
#    - IAM role: otel-collector-xray-role (xray:PutTraceSegments, etc.)
#
# 2. SigV4 Auth Extension
#    - Signs OTLP HTTP requests with AWS Signature V4
#    - Picks up credentials from IRSA-injected env vars
#    - Required by all AWS OTLP endpoints (X-Ray, CloudWatch)
#
# 3. X-Ray OTLP Exporter
#    - Uses standard otlphttp exporter (NOT the awsxray plugin)
#    - Points at AWS's native OTLP endpoint: xray.<region>.amazonaws.com
#    - Added to traces pipeline alongside Jaeger and spanmetrics
#    - Vanilla OTel SDK + Collector, no AWS-specific SDK needed
#
# 4. Resource Detection (EKS + EC2)
#    - Adds 'eks' and 'ec2' detectors to resourcedetection processor
#    - Auto-tags all telemetry with:
#      cloud.provider, cloud.platform (aws_eks), cloud.region,
#      cloud.account.id, k8s.cluster.name, host.id, host.type
#    - These are open-source OTel Contrib detectors, not AWS-proprietary
#
# To change region: replace all occurrences of 'us-east-1' below
# =============================================================================

opentelemetry-collector:
  # [1] IRSA: Use eksctl-created service account with X-Ray IAM role
  serviceAccount:
    create: false
    name: otel-collector

  config:
    # [2] SigV4: AWS request signing for OTLP endpoints
    extensions:
      sigv4auth:
        region: us-east-1
        service: xray
      sigv4auth/metrics:
        region: us-east-1
        service: monitoring

    # [3] X-Ray + CloudWatch Metrics: Standard OTLP exporters pointed at AWS endpoints
    exporters:
      otlphttp/xray:
        endpoint: https://xray.us-east-1.amazonaws.com
        auth:
          authenticator: sigv4auth
      otlphttp/cloudwatch-metrics:
        endpoint: https://granite.amazonaws.com
        compression: gzip
        auth:
          authenticator: sigv4auth/metrics
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
        sending_queue:
          enabled: true

    # [4] Resource Detection: Auto-discover AWS/EKS metadata
    processors:
      resourcedetection:
        detectors:
          - env
          - system
          - eks
          - ec2
        ec2:
          tags:
            - ^aws:autoscaling:groupName$
            - ^eks:cluster-name$

      # [6] Zeus compatibility: fix attributes that Zeus rejects
      # - Delete blank string attributes (spanmetrics emits "" for missing dimensions)
      # - Convert non-string attribute values to strings
      # Follow-up: Zeus should drop invalid attributes per-datapoint instead of
      #   rejecting entire metric batches (HTTP 400). Filed with Zeus team.
      # Zeus compatibility: fix attributes that Zeus rejects.
      # Zeus only accepts string-type attribute values. OTel receivers/processors
      # emit int, bool, and array types which cause HTTP 400 rejections.
      # Follow-up: Zeus should drop invalid attributes per-datapoint instead of
      #   rejecting entire metric batches. Filed with Zeus team.
      transform/zeus:
        error_mode: ignore
        metric_statements:
          - context: datapoint
            statements:
              - replace_all_patterns(attributes, "value", "^$", "unknown")
          - context: resource
            statements:
              - replace_all_patterns(attributes, "value", "^$", "unknown")
              # Array types (must delete - Concat cannot handle slices)
              - delete_key(attributes, "host.ip") where attributes["host.ip"] != nil
              - delete_key(attributes, "host.mac") where attributes["host.mac"] != nil
              # Int types from system/process detectors
              - set(attributes["host.cpu.family"], Concat([attributes["host.cpu.family"]], "")) where attributes["host.cpu.family"] != nil
              - set(attributes["host.cpu.model.id"], Concat([attributes["host.cpu.model.id"]], "")) where attributes["host.cpu.model.id"] != nil
              - set(attributes["host.cpu.model.name"], Concat([attributes["host.cpu.model.name"]], "")) where attributes["host.cpu.model.name"] != nil
              - set(attributes["host.cpu.stepping"], Concat([attributes["host.cpu.stepping"]], "")) where attributes["host.cpu.stepping"] != nil
              - set(attributes["host.cpu.cache.l2.size"], Concat([attributes["host.cpu.cache.l2.size"]], "")) where attributes["host.cpu.cache.l2.size"] != nil
              - set(attributes["process.pid"], Concat([attributes["process.pid"]], "")) where attributes["process.pid"] != nil
              - set(attributes["process.parent_pid"], Concat([attributes["process.parent_pid"]], "")) where attributes["process.parent_pid"] != nil
              - set(attributes["process.owner"], Concat([attributes["process.owner"]], "")) where attributes["process.owner"] != nil
              # Int/bool types from k8s receivers
              - set(attributes["k8s.container.restart_count"], Concat([attributes["k8s.container.restart_count"]], "")) where attributes["k8s.container.restart_count"] != nil
              # Bool from k8sattributes processor (otel_annotations)
              - delete_key(attributes, "k8s.pod.start_time") where attributes["k8s.pod.start_time"] != nil

    # [5] Span Metrics: Add dependency and operation dimensions
    connectors:
      spanmetrics:
        dimensions:
          # Dependency identification
          - name: peer.service
          - name: server.address
          - name: net.peer.name
          - name: db.system
          - name: messaging.system
          # Operation identification
          - name: http.route
          - name: rpc.service
          - name: rpc.method
          - name: db.operation
          - name: db.name
          - name: messaging.operation
          - name: messaging.destination

    service:
      extensions:
        - health_check
        - sigv4auth
        - sigv4auth/metrics
        - k8s_observer
        - k8s_leader_elector/k8s_cluster
      pipelines:
        traces:
          exporters:
            - otlp/jaeger
            - debug
            - spanmetrics
            - otlphttp/xray
        metrics:
          processors:
            - k8sattributes
            - memory_limiter
            - resourcedetection
            - resource
            - transform/zeus
            - batch
          exporters:
            - otlphttp/prometheus
            - debug
            - otlphttp/cloudwatch-metrics
