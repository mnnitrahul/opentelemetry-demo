# =============================================================================
# Helm Values: AWS Customizations for OpenTelemetry Demo
# =============================================================================
#
# This file contains all customizations applied on top of the vanilla
# opentelemetry-demo Helm chart to support AWS EKS + X-Ray deployment.
#
# Customizations:
#
# 1. Service Account (IRSA)
#    - Disables Helm-managed SA creation
#    - Uses the 'otel-collector' SA created by eksctl with IRSA
#    - Provides AWS credentials to the collector pod automatically
#    - IAM role: otel-collector-xray-role (xray:PutTraceSegments, etc.)
#
# 2. SigV4 Auth Extension
#    - Signs OTLP HTTP requests with AWS Signature V4
#    - Picks up credentials from IRSA-injected env vars
#    - Required by all AWS OTLP endpoints (X-Ray, CloudWatch)
#
# 3. X-Ray OTLP Exporter
#    - Uses standard otlphttp exporter (NOT the awsxray plugin)
#    - Points at AWS's native OTLP endpoint: xray.<region>.amazonaws.com
#    - Added to traces pipeline alongside Jaeger and spanmetrics
#    - Vanilla OTel SDK + Collector, no AWS-specific SDK needed
#
# 4. Resource Detection (EKS + EC2)
#    - Adds 'eks' and 'ec2' detectors to resourcedetection processor
#    - Auto-tags all telemetry with:
#      cloud.provider, cloud.platform (aws_eks), cloud.region,
#      cloud.account.id, k8s.cluster.name, host.id, host.type
#    - These are open-source OTel Contrib detectors, not AWS-proprietary
#
# To change region: replace all occurrences of 'us-east-1' below
# =============================================================================

opentelemetry-collector:
  # [1] IRSA: Use eksctl-created service account with X-Ray IAM role
  serviceAccount:
    create: false
    name: otel-collector

  config:
    # [2] SigV4: AWS request signing for OTLP endpoints
    extensions:
      sigv4auth:
        region: us-east-1
        service: xray
      sigv4auth/xray-beta:
        region: us-west-2
        service: xray
      sigv4auth/metrics:
        region: us-east-1
        service: monitoring

    # [3] X-Ray + CloudWatch Metrics: Standard OTLP exporters pointed at AWS endpoints
    exporters:
      otlphttp/xray:
        endpoint: https://xray.us-east-1.amazonaws.com
        auth:
          authenticator: sigv4auth
      otlphttp/xray-beta:
        endpoint: https://xray-beta.us-west-2.amazonaws.com
        auth:
          authenticator: sigv4auth/xray-beta
      otlphttp/cloudwatch-metrics:
        endpoint: https://granite.amazonaws.com
        compression: gzip
        auth:
          authenticator: sigv4auth/metrics
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
        sending_queue:
          enabled: true

    # [4] Resource Detection: Auto-discover AWS/EKS metadata
    processors:
      resourcedetection:
        detectors:
          - env
          - system
          - eks
          - ec2
        ec2:
          tags:
            - ^aws:autoscaling:groupName$
            - ^eks:cluster-name$

      # [6] Zeus compatibility: fix attributes that Zeus rejects
      # - Delete blank string attributes (spanmetrics emits "" for missing dimensions)
      # - Convert non-string attribute values to strings
      # Follow-up: Zeus should drop invalid attributes per-datapoint instead of
      #   rejecting entire metric batches (HTTP 400). Filed with Zeus team.
      # Zeus compatibility: fix attributes that Zeus rejects.
      #
      # Zeus accepts: string, int, bool, double attribute values
      # Zeus rejects: array ([]string) and map (kvlist) attribute values
      #
      # Known array-type attributes from OTel receivers/detectors:
      #   Resource level:
      #     host.ip                - []string (system detector)
      #     host.mac               - []string (system detector)
      #     process.command_args   - []string (process detector / Python SDK)
      #     aws.log.group.names    - []string (ECS detector)
      #     aws.log.stream.names   - []string (ECS detector)
      #     aws.log.group.arns     - []string (ECS detector)
      #     aws.log.stream.arns    - []string (ECS detector)
      #   Datapoint level:
      #     (none standard, but app SDKs may emit custom arrays)
      #
      # Zeus also rejects blank string values ("") which spanmetrics emits
      # for missing dimension attributes.
      #
      # Follow-up: Zeus should drop invalid attributes per-datapoint instead
      #   of rejecting entire metric batches (HTTP 400). Filed with Zeus team.
      transform/zeus:
        error_mode: ignore
        metric_statements:
          - context: datapoint
            statements:
              - replace_all_patterns(attributes, "value", "^$", "unknown")
          - context: resource
            statements:
              - replace_all_patterns(attributes, "value", "^$", "unknown")
              # Delete array-type attributes (only type Zeus rejects)
              - delete_key(attributes, "host.ip") where attributes["host.ip"] != nil
              - delete_key(attributes, "host.mac") where attributes["host.mac"] != nil
              - delete_key(attributes, "process.command_args") where attributes["process.command_args"] != nil
              - delete_key(attributes, "aws.log.group.names") where attributes["aws.log.group.names"] != nil
              - delete_key(attributes, "aws.log.stream.names") where attributes["aws.log.stream.names"] != nil
              - delete_key(attributes, "aws.log.group.arns") where attributes["aws.log.group.arns"] != nil
              - delete_key(attributes, "aws.log.stream.arns") where attributes["aws.log.stream.arns"] != nil

    # [5] Span Metrics: Add dependency and operation dimensions
    connectors:
      spanmetrics:
        dimensions:
          # Dependency identification
          - name: peer.service
          - name: server.address
          - name: net.peer.name
          - name: db.system
          - name: messaging.system
          # Operation identification
          - name: http.route
          - name: rpc.service
          - name: rpc.method
          - name: db.operation
          - name: db.name
          - name: messaging.operation
          - name: messaging.destination

    service:
      extensions:
        - health_check
        - sigv4auth
        - sigv4auth/xray-beta
        - sigv4auth/metrics
        - k8s_observer
        - k8s_leader_elector/k8s_cluster
      pipelines:
        traces:
          exporters:
            - otlp/jaeger
            - debug
            - spanmetrics
            - otlphttp/xray
            - otlphttp/xray-beta
        metrics:
          processors:
            - k8sattributes
            - memory_limiter
            - resourcedetection
            - resource
            - transform/zeus
            - batch
          exporters:
            - otlphttp/prometheus
            - debug
            - otlphttp/cloudwatch-metrics
