# Helm Values: Multi-Platform Deployment Overrides
# Placeholders resolved by deploy-multi-platform.sh via envsubst:
#   ${ECS_ALB_DNS}, ${APIGW_URL}, ${EC2_ALB_DNS}

default:
  envOverrides:
    - name: OTEL_RESOURCE_ATTRIBUTES_EXTRA
      value: "service.namespace=otel-demo-multi"

components:
  checkout:
    enabled: false
  cart:
    enabled: false
  product-catalog:
    enabled: false
  product-reviews:
    enabled: false
  ad:
    enabled: false
  recommendation:
    enabled: false
  currency:
    enabled: false
  quote:
    enabled: false
  email:
    enabled: false
  payment:
    enabled: false
  shipping:
    enabled: false
