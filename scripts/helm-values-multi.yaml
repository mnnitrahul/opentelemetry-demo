# Helm Values: Multi-Platform Sample App (separate EKS cluster)
# All services have multi- prefixed OTEL_SERVICE_NAME.
# Placeholder: ${AWS_REGION}

opentelemetry-collector:
  serviceAccount:
    create: false
    name: otel-collector
  config:
    extensions:
      sigv4auth:
        region: us-west-2
        service: xray
      sigv4auth/metrics:
        region: us-west-2
        service: monitoring
    exporters:
      otlphttp/xray:
        endpoint: https://xray-beta.us-west-2.amazonaws.com
        auth:
          authenticator: sigv4auth
      otlphttp/cloudwatch-metrics:
        endpoint: https://granite.amazonaws.com
        compression: gzip
        auth:
          authenticator: sigv4auth/metrics
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
        sending_queue:
          enabled: true
    processors:
      resourcedetection:
        detectors: [env, system, eks, ec2]
        ec2:
          tags:
            - ^aws:autoscaling:groupName$
            - ^eks:cluster-name$
      # Zeus compatibility: delete array/map attributes and replace blank strings
      transform/zeus:
        error_mode: ignore
        metric_statements:
          - context: datapoint
            statements:
              - replace_all_patterns(attributes, "value", "^$", "unknown")
          - context: resource
            statements:
              - replace_all_patterns(attributes, "value", "^$", "unknown")
              - delete_key(attributes, "host.ip") where attributes["host.ip"] != nil
              - delete_key(attributes, "host.mac") where attributes["host.mac"] != nil
              - delete_key(attributes, "process.command_args") where attributes["process.command_args"] != nil
              - delete_key(attributes, "aws.log.group.names") where attributes["aws.log.group.names"] != nil
              - delete_key(attributes, "aws.log.stream.names") where attributes["aws.log.stream.names"] != nil
              - delete_key(attributes, "aws.log.group.arns") where attributes["aws.log.group.arns"] != nil
              - delete_key(attributes, "aws.log.stream.arns") where attributes["aws.log.stream.arns"] != nil
    connectors:
      spanmetrics:
        dimensions:
          - name: peer.service
          - name: server.address
          - name: net.peer.name
          - name: db.system
          - name: messaging.system
          - name: http.route
          - name: rpc.service
          - name: rpc.method
          - name: db.operation
          - name: db.name
          - name: messaging.operation
          - name: messaging.destination
    service:
      extensions: [health_check, sigv4auth, sigv4auth/metrics, k8s_observer, k8s_leader_elector/k8s_cluster]
      pipelines:
        traces:
          exporters: [otlp/jaeger, debug, spanmetrics, otlphttp/xray]
        metrics:
          processors:
            - k8sattributes
            - memory_limiter
            - resourcedetection
            - resource
            - transform/zeus
            - batch
          exporters: [otlphttp/prometheus, debug, otlphttp/cloudwatch-metrics]

