# =============================================================================
# Helm Values: Multi-Platform Deployment Overrides
# =============================================================================
#
# Placeholders (resolved by deploy-multi-platform.sh via envsubst):
#   ${ECS_ALB_DNS}  — ECS ALB DNS name
#   ${APIGW_URL}    — API Gateway base URL
#   ${EC2_ALB_DNS}  — EC2 ALB DNS name
# =============================================================================

# Override default env vars for all components.
# OTEL_RESOURCE_ATTRIBUTES_EXTRA is appended to OTEL_RESOURCE_ATTRIBUTES
# by the chart (no duplicate key issue).
default:
  envOverrides:
    - name: OTEL_RESOURCE_ATTRIBUTES_EXTRA
      value: "service.namespace=otel-demo-multi"

# Per-component overrides: rename services and redirect addresses.
# We use 'env' (not envOverrides) to replace the chart's default env block
# with useDefault.env=false to avoid duplicate keys.
components:
  frontend:
    useDefault:
      env: false
    env:
      - name: OTEL_SERVICE_NAME
        value: multi-frontend
      - name: FRONTEND_PORT
        value: "8080"
      - name: FRONTEND_ADDR
        value: :8080
      - name: AD_ADDR
        value: "http://${APIGW_URL}/ad"
      - name: CART_ADDR
        value: "${ECS_ALB_DNS}:7070"
      - name: CHECKOUT_ADDR
        value: "${ECS_ALB_DNS}:5050"
      - name: CURRENCY_ADDR
        value: "http://${APIGW_URL}/currency"
      - name: PRODUCT_CATALOG_ADDR
        value: "${ECS_ALB_DNS}:3550"
      - name: PRODUCT_REVIEWS_ADDR
        value: "${ECS_ALB_DNS}:3551"
      - name: RECOMMENDATION_ADDR
        value: "http://${APIGW_URL}/recommendation"
      - name: SHIPPING_ADDR
        value: "http://${EC2_ALB_DNS}:50050"
      - name: OTEL_EXPORTER_OTLP_ENDPOINT
        value: http://otel-collector:4317
      - name: OTEL_RESOURCE_ATTRIBUTES
        value: service.namespace=otel-demo-multi
  frontend-proxy:
    envOverrides:
      - name: OTEL_RESOURCE_ATTRIBUTES_EXTRA
        value: "service.namespace=otel-demo-multi"
  load-generator:
    envOverrides:
      - name: OTEL_RESOURCE_ATTRIBUTES_EXTRA
        value: "service.namespace=otel-demo-multi"
  accounting:
    envOverrides:
      - name: OTEL_RESOURCE_ATTRIBUTES_EXTRA
        value: "service.namespace=otel-demo-multi"
  fraud-detection:
    envOverrides:
      - name: OTEL_RESOURCE_ATTRIBUTES_EXTRA
        value: "service.namespace=otel-demo-multi"
  kafka:
    envOverrides:
      - name: OTEL_RESOURCE_ATTRIBUTES_EXTRA
        value: "service.namespace=otel-demo-multi"
  flagd:
    envOverrides:
      - name: OTEL_RESOURCE_ATTRIBUTES_EXTRA
        value: "service.namespace=otel-demo-multi"
  image-provider:
    envOverrides:
      - name: OTEL_RESOURCE_ATTRIBUTES_EXTRA
        value: "service.namespace=otel-demo-multi"
  valkey-cart:
    envOverrides:
      - name: OTEL_RESOURCE_ATTRIBUTES_EXTRA
        value: "service.namespace=otel-demo-multi"
  postgresql:
    envOverrides:
      - name: OTEL_RESOURCE_ATTRIBUTES_EXTRA
        value: "service.namespace=otel-demo-multi"
  # --- Disable services that moved off EKS ---
  checkout:
    enabled: false
  cart:
    enabled: false
  product-catalog:
    enabled: false
  product-reviews:
    enabled: false
  ad:
    enabled: false
  recommendation:
    enabled: false
  currency:
    enabled: false
  quote:
    enabled: false
  email:
    enabled: false
  payment:
    enabled: false
  shipping:
    enabled: false
