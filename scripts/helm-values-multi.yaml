# Helm Values: Multi-Platform Sample App
# Deployed on a SEPARATE EKS cluster (otel-demo-multi).
# Full observability stack (Jaeger, Grafana, Prometheus, OpenSearch).
# Placeholders: ${AWS_REGION}

opentelemetry-collector:
  serviceAccount:
    create: false
    name: otel-collector
  config:
    extensions:
      sigv4auth:
        region: ${AWS_REGION}
        service: xray
    exporters:
      otlphttp/xray:
        endpoint: https://xray.${AWS_REGION}.amazonaws.com
        auth:
          authenticator: sigv4auth
    processors:
      resourcedetection:
        detectors:
          - env
          - system
          - eks
          - ec2
    connectors:
      spanmetrics:
        dimensions:
          - name: peer.service
          - name: server.address
          - name: net.peer.name
          - name: db.system
          - name: messaging.system
          - name: http.route
          - name: rpc.service
          - name: rpc.method
          - name: db.operation
          - name: db.name
          - name: messaging.operation
          - name: messaging.destination
    service:
      extensions:
        - health_check
        - sigv4auth
        - k8s_observer
        - k8s_leader_elector/k8s_cluster
      pipelines:
        traces:
          exporters:
            - otlp/jaeger
            - debug
            - spanmetrics
            - otlphttp/xray

default:
  envOverrides:
    - name: OTEL_RESOURCE_ATTRIBUTES_EXTRA
      value: "service.namespace=otel-demo-multi"

# Disable services that run on ECS/Lambda/EC2
components:
  checkout:
    enabled: false
  cart:
    enabled: false
  product-catalog:
    enabled: false
  product-reviews:
    enabled: false
  ad:
    enabled: false
  recommendation:
    enabled: false
  currency:
    enabled: false
  quote:
    enabled: false
  email:
    enabled: false
  payment:
    enabled: false
  shipping:
    enabled: false
