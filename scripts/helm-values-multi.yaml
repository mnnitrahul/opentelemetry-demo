# Helm Values: Multi-Platform Sample App
# Separate Helm release in namespace otel-demo-multi.
# Placeholders: ${ECS_ALB_DNS}, ${APIGW_URL}, ${EC2_ALB_DNS}, ${AWS_REGION}

opentelemetry-collector:
  serviceAccount:
    create: false
    name: otel-collector
  clusterRole:
    create: false
  config:
    extensions:
      sigv4auth:
        region: ${AWS_REGION}
        service: xray
    exporters:
      otlphttp/xray:
        endpoint: https://xray.${AWS_REGION}.amazonaws.com
        auth:
          authenticator: sigv4auth
    processors:
      resourcedetection:
        detectors:
          - env
          - system
          - eks
          - ec2
    connectors:
      spanmetrics:
        dimensions:
          - name: peer.service
          - name: server.address
          - name: db.system
          - name: messaging.system
          - name: rpc.service
          - name: rpc.method
    service:
      extensions:
        - health_check
        - sigv4auth
      pipelines:
        traces:
          exporters:
            - debug
            - spanmetrics
            - otlphttp/xray

default:
  envOverrides:
    - name: OTEL_RESOURCE_ATTRIBUTES_EXTRA
      value: "service.namespace=otel-demo-multi"

grafana:
  enabled: false
jaeger:
  enabled: false
prometheus:
  enabled: false
opensearch:
  enabled: false

components:
  checkout:
    enabled: false
  cart:
    enabled: false
  product-catalog:
    enabled: false
  product-reviews:
    enabled: false
  ad:
    enabled: false
  recommendation:
    enabled: false
  currency:
    enabled: false
  quote:
    enabled: false
  email:
    enabled: false
  payment:
    enabled: false
  shipping:
    enabled: false
