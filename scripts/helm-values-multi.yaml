# Helm Values: Multi-Platform Sample App
# Separate EKS cluster (otel-demo-multi).
# Placeholders: ${ECS_ALB_DNS}, ${APIGW_URL}, ${EC2_ALB_DNS}, ${AWS_REGION},
#               ${AURORA_CONN_STR}, ${MSK_BOOTSTRAP}, ${VALKEY_ENDPOINT}

opentelemetry-collector:
  serviceAccount:
    create: false
    name: otel-collector
  config:
    extensions:
      sigv4auth:
        region: ${AWS_REGION}
        service: xray
    exporters:
      otlphttp/xray:
        endpoint: https://xray.${AWS_REGION}.amazonaws.com
        auth:
          authenticator: sigv4auth
    processors:
      resourcedetection:
        detectors: [env, system, eks, ec2]
    connectors:
      spanmetrics:
        dimensions:
          - name: peer.service
          - name: server.address
          - name: net.peer.name
          - name: db.system
          - name: messaging.system
          - name: http.route
          - name: rpc.service
          - name: rpc.method
          - name: db.operation
          - name: db.name
          - name: messaging.operation
          - name: messaging.destination
    service:
      extensions: [health_check, sigv4auth, k8s_observer, k8s_leader_elector/k8s_cluster]
      pipelines:
        traces:
          exporters: [otlp/jaeger, debug, spanmetrics, otlphttp/xray]


components:
  frontend:
    useDefault:
      env: false
    env:
      - name: OTEL_SERVICE_NAME
        value: multi-frontend
      - name: OTEL_COLLECTOR_NAME
        value: otel-collector
      - name: OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE
        value: cumulative
      - name: FRONTEND_PORT
        value: "8080"
      - name: FRONTEND_ADDR
        value: :8080
      - name: AD_ADDR
        value: "http://${APIGW_URL}/ad"
      - name: CART_ADDR
        value: "${ECS_ALB_DNS}:7070"
      - name: CHECKOUT_ADDR
        value: "${ECS_ALB_DNS}:5050"
      - name: CURRENCY_ADDR
        value: "http://${APIGW_URL}/currency"
      - name: PRODUCT_CATALOG_ADDR
        value: "${ECS_ALB_DNS}:3550"
      - name: PRODUCT_REVIEWS_ADDR
        value: "${ECS_ALB_DNS}:3551"
      - name: RECOMMENDATION_ADDR
        value: "http://${APIGW_URL}/recommendation"
      - name: SHIPPING_ADDR
        value: "http://${EC2_ALB_DNS}:50050"
      - name: PAYMENT_ADDR
        value: "${EC2_ALB_DNS}:50051"
      - name: OTEL_EXPORTER_OTLP_ENDPOINT
        value: http://otel-collector:4317
      - name: OTEL_RESOURCE_ATTRIBUTES
        value: service.namespace=otel-demo-multi
      - name: WEB_OTEL_SERVICE_NAME
        value: multi-frontend-web
      - name: OTEL_COLLECTOR_HOST
        value: otel-collector
      - name: PUBLIC_OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
        value: http://localhost:8080/otlp-http/v1/traces
      - name: FLAGD_HOST
        value: flagd
      - name: FLAGD_PORT
        value: "8013"

  frontend-proxy:
    useDefault:
      env: false
    env:
      - name: OTEL_SERVICE_NAME
        value: multi-frontend-proxy
      - name: OTEL_COLLECTOR_NAME
        value: otel-collector
      - name: OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE
        value: cumulative
      - name: ENVOY_PORT
        value: "8080"
      - name: ENVOY_ADDR
        value: 0.0.0.0
      - name: ENVOY_ADMIN_PORT
        value: "10000"
      - name: FLAGD_HOST
        value: flagd
      - name: FLAGD_PORT
        value: "8013"
      - name: FLAGD_UI_HOST
        value: flagd
      - name: FLAGD_UI_PORT
        value: "4000"
      - name: FRONTEND_HOST
        value: frontend
      - name: FRONTEND_PORT
        value: "8080"
      - name: GRAFANA_HOST
        value: grafana
      - name: GRAFANA_PORT
        value: "80"
      - name: IMAGE_PROVIDER_HOST
        value: image-provider
      - name: IMAGE_PROVIDER_PORT
        value: "8081"
      - name: JAEGER_HOST
        value: jaeger
      - name: JAEGER_UI_PORT
        value: "16686"
      - name: LOCUST_WEB_HOST
        value: load-generator
      - name: LOCUST_WEB_PORT
        value: "8089"
      - name: OTEL_COLLECTOR_HOST
        value: otel-collector
      - name: OTEL_COLLECTOR_PORT_GRPC
        value: "4317"
      - name: OTEL_COLLECTOR_PORT_HTTP
        value: "4318"

  load-generator:
    useDefault:
      env: false
    env:
      - name: OTEL_SERVICE_NAME
        value: multi-load-generator
      - name: OTEL_COLLECTOR_NAME
        value: otel-collector
      - name: OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE
        value: cumulative
      - name: LOCUST_WEB_HOST
        value: 0.0.0.0
      - name: LOCUST_WEB_PORT
        value: "8089"
      - name: LOCUST_USERS
        value: "10"
      - name: LOCUST_SPAWN_RATE
        value: "1"
      - name: LOCUST_HOST
        value: http://frontend-proxy:8080
      - name: LOCUST_HEADLESS
        value: "false"
      - name: LOCUST_AUTOSTART
        value: "true"
      - name: LOCUST_BROWSER_TRAFFIC_ENABLED
        value: "true"
      - name: PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION
        value: python
      - name: FLAGD_HOST
        value: flagd
      - name: FLAGD_PORT
        value: "8013"
      - name: FLAGD_OFREP_PORT
        value: "8016"
      - name: OTEL_EXPORTER_OTLP_ENDPOINT
        value: http://otel-collector:4317

  accounting:
    useDefault:
      env: false
    env:
      - name: OTEL_SERVICE_NAME
        value: multi-accounting
      - name: OTEL_COLLECTOR_NAME
        value: otel-collector
      - name: OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE
        value: cumulative
      - name: KAFKA_ADDR
        value: "${MSK_BOOTSTRAP}"
      - name: OTEL_EXPORTER_OTLP_ENDPOINT
        value: http://otel-collector:4318
      - name: DB_CONNECTION_STRING
        value: "${AURORA_CONN_STR}"
      - name: OTEL_DOTNET_AUTO_TRACES_ENTITYFRAMEWORKCORE_INSTRUMENTATION_ENABLED
        value: "false"

  fraud-detection:
    useDefault:
      env: false
    env:
      - name: OTEL_SERVICE_NAME
        value: multi-fraud-detection
      - name: OTEL_COLLECTOR_NAME
        value: otel-collector
      - name: OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE
        value: cumulative
      - name: KAFKA_ADDR
        value: "${MSK_BOOTSTRAP}"
      - name: FLAGD_HOST
        value: flagd
      - name: FLAGD_PORT
        value: "8013"
      - name: OTEL_EXPORTER_OTLP_ENDPOINT
        value: http://otel-collector:4318
      - name: OTEL_INSTRUMENTATION_KAFKA_EXPERIMENTAL_SPAN_ATTRIBUTES
        value: "true"
      - name: OTEL_INSTRUMENTATION_MESSAGING_EXPERIMENTAL_RECEIVE_TELEMETRY_ENABLED
        value: "true"

  flagd:
    useDefault:
      env: false
    env:
      - name: OTEL_SERVICE_NAME
        value: multi-flagd
      - name: OTEL_COLLECTOR_NAME
        value: otel-collector
      - name: OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE
        value: cumulative
      - name: FLAGD_METRICS_EXPORTER
        value: otel
      - name: FLAGD_OTEL_COLLECTOR_URI
        value: otel-collector:4317
      - name: GOMEMLIMIT
        value: 60MiB

  image-provider:
    useDefault:
      env: false
    env:
      - name: OTEL_SERVICE_NAME
        value: multi-image-provider
      - name: OTEL_COLLECTOR_NAME
        value: otel-collector
      - name: OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE
        value: cumulative
      - name: IMAGE_PROVIDER_PORT
        value: "8081"
      - name: OTEL_COLLECTOR_PORT_GRPC
        value: "4317"
      - name: OTEL_COLLECTOR_HOST
        value: otel-collector

  llm:
    useDefault:
      env: false
    env:
      - name: OTEL_SERVICE_NAME
        value: multi-llm
      - name: OTEL_COLLECTOR_NAME
        value: otel-collector
      - name: OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE
        value: cumulative
      - name: FLAGD_HOST
        value: flagd
      - name: FLAGD_PORT
        value: "8013"

  # Disabled: managed AWS services
  kafka:
    enabled: false
  postgresql:
    enabled: false
  valkey-cart:
    enabled: false
  # Disabled: ECS/Lambda/EC2
  checkout:
    enabled: false
  cart:
    enabled: false
  product-catalog:
    enabled: false
  product-reviews:
    enabled: false
  ad:
    enabled: false
  recommendation:
    enabled: false
  currency:
    enabled: false
  quote:
    enabled: false
  email:
    enabled: false
  payment:
    enabled: false
  shipping:
    enabled: false
