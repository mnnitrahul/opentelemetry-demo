# Extra settings merged into OpenTelemetry Collector configuration
# Adds X-Ray OTLP endpoint for traces alongside existing Jaeger exporter

extensions:
  sigv4auth:
    region: us-east-1
    service: xray

exporters:
  otlphttp/xray:
    endpoint: https://xray.us-east-1.amazonaws.com
    auth:
      authenticator: sigv4auth

service:
  extensions: [sigv4auth]
  pipelines:
    traces:
      exporters: [otlp_grpc/jaeger, spanmetrics, otlphttp/xray, debug]
