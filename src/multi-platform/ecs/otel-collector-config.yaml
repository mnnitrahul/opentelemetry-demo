receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

extensions:
  sigv4auth:
    region: ${AWS_REGION}
    service: xray

exporters:
  otlphttp/xray:
    endpoint: https://xray.${AWS_REGION}.amazonaws.com
    auth:
      authenticator: sigv4auth
  debug:
    verbosity: basic

service:
  extensions: [sigv4auth]
  pipelines:
    traces:
      receivers: [otlp]
      exporters: [otlphttp/xray, debug]
