name: Multi-Platform Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        type: choice
        options:
          - deploy
          - destroy
      region:
        description: "AWS region"
        required: true
        default: "us-east-1"
      cluster_name:
        description: "Original EKS cluster name"
        required: true
        default: "otel-demo"

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: deploy both apps
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.inputs.action == 'deploy'
    env:
      REGION: ${{ github.event.inputs.region || 'us-east-1' }}
      CLUSTER_NAME: ${{ github.event.inputs.cluster_name || 'otel-demo' }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.REGION }}

      - uses: azure/setup-kubectl@v4
      - uses: azure/setup-helm@v4

      - name: Install eksctl
        run: |
          curl -sLO "https://github.com/eksctl-io/eksctl/releases/latest/download/eksctl_$(uname -s)_amd64.tar.gz"
          tar -xzf eksctl_*.tar.gz -C /tmp && sudo mv /tmp/eksctl /usr/local/bin

      - name: Deploy original EKS app
        run: |
          REGION="${{ env.REGION }}"
          CLUSTER="${{ env.CLUSTER_NAME }}"
          NAMESPACE="otel-demo"
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          POLICY_ARN="arn:aws:iam::${ACCOUNT_ID}:policy/otel-collector-xray-policy"

          XRAY_POLICY_DOC='{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Action":["xray:PutTraceSegments","xray:PutTelemetryRecords","xray:GetSamplingRules","xray:GetSamplingTargets","cloudwatch:*","ec2:DescribeTags"],"Resource":"*"}]}'
          if ! aws iam get-policy --policy-arn "${POLICY_ARN}" &>/dev/null; then
            POLICY_ARN=$(aws iam create-policy --policy-name otel-collector-xray-policy \
              --policy-document "${XRAY_POLICY_DOC}" \
              --query 'Policy.Arn' --output text)
          else
            aws iam create-policy-version --policy-arn "${POLICY_ARN}" \
              --policy-document "${XRAY_POLICY_DOC}" \
              --set-as-default 2>/dev/null || true
          fi

          aws eks update-kubeconfig --name "${CLUSTER}" --region "${REGION}"

          # Ensure GitHub Actions role has EKS access
          ROLE_ARN="${{ secrets.AWS_ROLE_ARN }}"
          aws eks create-access-entry --cluster-name "${CLUSTER}" --principal-arn "${ROLE_ARN}" --region "${REGION}" 2>/dev/null || true
          aws eks associate-access-policy --cluster-name "${CLUSTER}" --principal-arn "${ROLE_ARN}" \
            --policy-arn "arn:aws:eks::aws:cluster-access-policy/AmazonEKSClusterAdminPolicy" \
            --access-scope type=cluster --region "${REGION}" 2>/dev/null || true

          eksctl create iamserviceaccount --name otel-collector --namespace "${NAMESPACE}" \
            --cluster "${CLUSTER}" --region "${REGION}" --attach-policy-arn "${POLICY_ARN}" \
            --role-name otel-collector-xray-role --approve --override-existing-serviceaccounts || true

          kubectl annotate serviceaccount otel-collector -n "${NAMESPACE}" \
            meta.helm.sh/release-name=otel-demo meta.helm.sh/release-namespace="${NAMESPACE}" --overwrite 2>/dev/null || true
          kubectl label serviceaccount otel-collector -n "${NAMESPACE}" \
            app.kubernetes.io/managed-by=Helm --overwrite 2>/dev/null || true

          # Fix ClusterRole ownership back to original release (may have been relabeled)
          for resource in clusterrole/otel-collector clusterrolebinding/otel-collector; do
            kubectl annotate "${resource}" \
              meta.helm.sh/release-name=otel-demo \
              meta.helm.sh/release-namespace="${NAMESPACE}" \
              --overwrite --field-manager=helm 2>/dev/null || true
          done

          helm repo add open-telemetry https://open-telemetry.github.io/opentelemetry-helm-charts
          helm repo update
          sed "s/us-east-1/${REGION}/g" scripts/helm-values-xray.yaml > /tmp/helm-values-xray.yaml
          helm upgrade --install otel-demo open-telemetry/opentelemetry-demo \
            --namespace "${NAMESPACE}" --create-namespace \
            -f /tmp/helm-values-xray.yaml --wait --timeout 15m

          # Clean up any stale otel-demo-multi namespace on the original cluster
          # This can happen if a previous deploy-multi-platform.sh run failed and
          # left resources behind. The multi-platform app belongs on otel-demo-multi
          # cluster, not here. Stale collector DaemonSets hold hostPorts and block
          # the otel-demo collectors from scheduling.
          if kubectl get namespace otel-demo-multi &>/dev/null; then
            echo "WARNING: Found stale otel-demo-multi namespace on ${CLUSTER} cluster. Cleaning up..."
            helm uninstall otel-demo-multi --namespace otel-demo-multi 2>/dev/null || true
            kubectl delete namespace otel-demo-multi --timeout=120s 2>/dev/null || true
          fi

      - name: Deploy multi-platform app (separate cluster + CFN stacks)
        run: |
          chmod +x ./scripts/deploy-multi-platform.sh
          ./scripts/deploy-multi-platform.sh --region ${{ env.REGION }} --cluster ${{ env.CLUSTER_NAME }}

      - name: Deploy multi-platform services (ECS, Lambda, EC2)
        run: |
          pip install boto3 aws-xray-sdk --quiet
          chmod +x ./scripts/deploy-multi-services.sh
          ./scripts/deploy-multi-services.sh --region ${{ env.REGION }}

      - name: Print access endpoints
        run: |
          REGION="${{ env.REGION }}"
          ECS_ALB=$(aws cloudformation describe-stacks --region "${REGION}" --stack-name otel-demo-ecs \
            --query "Stacks[0].Outputs[?OutputKey=='AlbDnsName'].OutputValue" --output text 2>/dev/null || echo "N/A")
          APIGW=$(aws cloudformation describe-stacks --region "${REGION}" --stack-name otel-demo-lambda \
            --query "Stacks[0].Outputs[?OutputKey=='ApiGatewayUrl'].OutputValue" --output text 2>/dev/null || echo "N/A")
          echo "============================================"
          echo "  1. Original EKS App (cluster: otel-demo)"
          echo "     kubectl port-forward -n otel-demo svc/frontend-proxy 8080:8080"
          echo ""
          echo "  2. Multi-Platform App (cluster: otel-demo-multi)"
          echo "     kubectl port-forward -n otel-demo svc/frontend-proxy 8081:8080"
          echo "     ECS: ${ECS_ALB} | APIGW: ${APIGW}"
          echo ""
          echo "  X-Ray: https://${REGION}.console.aws.amazon.com/xray/home#/service-map"
          echo "============================================"

  destroy:
    name: destroy multi-platform
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
    env:
      REGION: ${{ github.event.inputs.region || 'us-east-1' }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.REGION }}

      - uses: azure/setup-kubectl@v4
      - uses: azure/setup-helm@v4

      - name: Install eksctl
        run: |
          curl -sLO "https://github.com/eksctl-io/eksctl/releases/latest/download/eksctl_$(uname -s)_amd64.tar.gz"
          tar -xzf eksctl_*.tar.gz -C /tmp && sudo mv /tmp/eksctl /usr/local/bin

      - name: Destroy
        run: |
          chmod +x ./scripts/cleanup-multi-platform.sh
          echo "y" | ./scripts/cleanup-multi-platform.sh --region ${{ env.REGION }}
