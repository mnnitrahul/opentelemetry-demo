name: EKS Deploy / Destroy OpenTelemetry Demo

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        type: choice
        options:
          - deploy
          - destroy
      region:
        description: "AWS region"
        required: true
        default: "us-east-1"
      cluster_name:
        description: "EKS cluster name"
        required: true
        default: "otel-demo"
      node_type:
        description: "EC2 instance type for nodes"
        required: true
        default: "m5.xlarge"
      node_count:
        description: "Number of worker nodes"
        required: true
        default: "3"

env:
  NAMESPACE: otel-demo
  XRAY_POLICY_NAME: otel-collector-xray-policy
  XRAY_ROLE_NAME: otel-collector-xray-role
  COLLECTOR_SA_NAME: otel-collector

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    if: github.event.inputs.action == 'deploy'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.region }}

      - name: Install eksctl
        run: |
          ARCH=amd64
          PLATFORM=$(uname -s)_$ARCH
          curl -sLO "https://github.com/eksctl-io/eksctl/releases/latest/download/eksctl_$PLATFORM.tar.gz"
          tar -xzf eksctl_$PLATFORM.tar.gz -C /tmp
          sudo mv /tmp/eksctl /usr/local/bin

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Create EKS cluster
        run: |
          eksctl create cluster \
            --name "${{ inputs.cluster_name }}" \
            --region "${{ inputs.region }}" \
            --nodes "${{ inputs.node_count }}" \
            --node-type "${{ inputs.node_type }}" \
            --with-oidc \
            --managed

      - name: Create IAM policy for X-Ray
        id: iam
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          POLICY_ARN="arn:aws:iam::${ACCOUNT_ID}:policy/${XRAY_POLICY_NAME}"

          if ! aws iam get-policy --policy-arn "${POLICY_ARN}" &> /dev/null; then
            POLICY_ARN=$(aws iam create-policy \
              --policy-name "${XRAY_POLICY_NAME}" \
              --policy-document '{
                "Version": "2012-10-17",
                "Statement": [{
                  "Effect": "Allow",
                  "Action": [
                    "xray:PutTraceSegments",
                    "xray:PutTelemetryRecords",
                    "xray:GetSamplingRules",
                    "xray:GetSamplingTargets"
                  ],
                  "Resource": "*"
                }]
              }' \
              --query 'Policy.Arn' --output text)
          fi
          echo "policy_arn=${POLICY_ARN}" >> "$GITHUB_OUTPUT"

      - name: Create IRSA for OTel Collector
        run: |
          eksctl create iamserviceaccount \
            --name "${COLLECTOR_SA_NAME}" \
            --namespace "${NAMESPACE}" \
            --cluster "${{ inputs.cluster_name }}" \
            --region "${{ inputs.region }}" \
            --attach-policy-arn "${{ steps.iam.outputs.policy_arn }}" \
            --role-name "${XRAY_ROLE_NAME}" \
            --approve \
            --override-existing-serviceaccounts

      - name: Deploy OpenTelemetry Demo
        run: |
          helm repo add open-telemetry https://open-telemetry.github.io/opentelemetry-helm-charts
          helm repo update

          helm install otel-demo open-telemetry/opentelemetry-demo \
            --namespace "${NAMESPACE}" \
            --create-namespace \
            --set opentelemetry-collector.serviceAccount.create=false \
            --set opentelemetry-collector.serviceAccount.name="${COLLECTOR_SA_NAME}" \
            --set opentelemetry-collector.config.extensions.sigv4auth.region="${{ inputs.region }}" \
            --set opentelemetry-collector.config.extensions.sigv4auth.service=xray \
            --set 'opentelemetry-collector.config.exporters.otlphttp/xray.endpoint=https://xray.${{ inputs.region }}.amazonaws.com' \
            --set 'opentelemetry-collector.config.exporters.otlphttp/xray.auth.authenticator=sigv4auth' \
            --set 'opentelemetry-collector.config.service.extensions[0]=health_check' \
            --set 'opentelemetry-collector.config.service.extensions[1]=sigv4auth' \
            --wait \
            --timeout 10m

      - name: Print access info
        run: |
          echo "============================================"
          echo " Deployment complete!"
          echo "============================================"
          echo ""
          echo "Configure kubectl:"
          echo "  aws eks update-kubeconfig --name ${{ inputs.cluster_name }} --region ${{ inputs.region }}"
          echo ""
          echo "Access frontend:"
          echo "  kubectl port-forward -n ${NAMESPACE} svc/otel-demo-frontend-proxy 8080:8080"
          echo ""
          echo "X-Ray console:"
          echo "  https://${{ inputs.region }}.console.aws.amazon.com/xray/home?region=${{ inputs.region }}#/traces"

  destroy:
    if: github.event.inputs.action == 'destroy'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.region }}

      - name: Install eksctl
        run: |
          ARCH=amd64
          PLATFORM=$(uname -s)_$ARCH
          curl -sLO "https://github.com/eksctl-io/eksctl/releases/latest/download/eksctl_$PLATFORM.tar.gz"
          tar -xzf eksctl_$PLATFORM.tar.gz -C /tmp
          sudo mv /tmp/eksctl /usr/local/bin

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name "${{ inputs.cluster_name }}" \
            --region "${{ inputs.region }}"

      - name: Uninstall Helm release
        run: |
          helm uninstall otel-demo --namespace "${NAMESPACE}" || true
          kubectl delete namespace "${NAMESPACE}" --wait=true || true

      - name: Delete IRSA
        run: |
          eksctl delete iamserviceaccount \
            --name "${COLLECTOR_SA_NAME}" \
            --namespace "${NAMESPACE}" \
            --cluster "${{ inputs.cluster_name }}" \
            --region "${{ inputs.region }}" || true

      - name: Delete IAM policy
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          POLICY_ARN="arn:aws:iam::${ACCOUNT_ID}:policy/${XRAY_POLICY_NAME}"
          aws iam delete-policy --policy-arn "${POLICY_ARN}" || true

      - name: Delete EKS cluster
        run: |
          eksctl delete cluster \
            --name "${{ inputs.cluster_name }}" \
            --region "${{ inputs.region }}" \
            --wait

      - name: Confirm cleanup
        run: echo "All resources destroyed successfully."
