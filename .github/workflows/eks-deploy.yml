name: EKS Deploy / Destroy OpenTelemetry Demo

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        type: choice
        options:
          - deploy
          - destroy
      region:
        description: "AWS region"
        required: true
        default: "us-east-1"
      cluster_name:
        description: "EKS cluster name"
        required: true
        default: "otel-demo"
      node_type:
        description: "EC2 instance type for nodes"
        required: true
        default: "m5.xlarge"
      node_count:
        description: "Number of worker nodes"
        required: true
        default: "3"
      values_file:
        description: "Helm values file (path within repo)"
        required: true
        default: "scripts/helm-values-xray.yaml"

env:
  NAMESPACE: otel-demo
  XRAY_POLICY_NAME: otel-collector-xray-policy
  # Role name is suffixed with the cluster name at use-site so multiple clusters
  # in the same account don't collide. Final form: otel-collector-xray-role-<cluster_name>
  XRAY_ROLE_NAME: otel-collector-xray-role
  COLLECTOR_SA_NAME: otel-collector
  APP_TAG: Application=AppWithMidlina

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    if: github.event.inputs.action == 'deploy'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.region }}

      - name: Install eksctl
        run: |
          ARCH=amd64
          PLATFORM=$(uname -s)_$ARCH
          curl -sLO "https://github.com/eksctl-io/eksctl/releases/latest/download/eksctl_$PLATFORM.tar.gz"
          tar -xzf eksctl_$PLATFORM.tar.gz -C /tmp
          sudo mv /tmp/eksctl /usr/local/bin

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Create EKS cluster (skip if exists)
        run: |
          if aws eks describe-cluster --name "${{ inputs.cluster_name }}" --region "${{ inputs.region }}" &>/dev/null; then
            echo "Cluster '${{ inputs.cluster_name }}' already exists. Skipping creation."
            aws eks update-kubeconfig --name "${{ inputs.cluster_name }}" --region "${{ inputs.region }}"
          else
            echo "Cluster not found. Creating..."
            eksctl create cluster \
              --name "${{ inputs.cluster_name }}" \
              --region "${{ inputs.region }}" \
              --nodes "${{ inputs.node_count }}" \
              --node-type "${{ inputs.node_type }}" \
              --with-oidc \
              --managed \
              --tags "${APP_TAG}"
          fi

      - name: Create IAM policy for X-Ray and CloudWatch Metrics V2
        id: iam
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          POLICY_ARN="arn:aws:iam::${ACCOUNT_ID}:policy/${XRAY_POLICY_NAME}"

          # CloudWatch Metrics V2 (Zeus) reuses cloudwatch:PutMetricData.
          # cloudwatch:PutOtelMetricData is required for FAS-token callers.
          POLICY_DOC='{
            "Version": "2012-10-17",
            "Statement": [{
              "Effect": "Allow",
              "Action": [
                "xray:PutTraceSegments",
                "xray:PutTelemetryRecords",
                "xray:GetSamplingRules",
                "xray:GetSamplingTargets",
                "cloudwatch:PutMetricData",
                "cloudwatch:PutOtelMetricData"
              ],
              "Resource": "*"
            }]
          }'

          if aws iam get-policy --policy-arn "${POLICY_ARN}" &> /dev/null; then
            # Policy exists from prior runs (may be missing cloudwatch:* actions);
            # publish a new default version so V2 ingestion works.
            aws iam create-policy-version \
              --policy-arn "${POLICY_ARN}" \
              --policy-document "${POLICY_DOC}" \
              --set-as-default || true
          else
            POLICY_ARN=$(aws iam create-policy \
              --policy-name "${XRAY_POLICY_NAME}" \
              --policy-document "${POLICY_DOC}" \
              --query 'Policy.Arn' --output text)
          fi
          echo "policy_arn=${POLICY_ARN}" >> "$GITHUB_OUTPUT"

      - name: Create IRSA for OTel Collector
        env:
          CLUSTER_NAME: ${{ inputs.cluster_name }}
          REGION: ${{ inputs.region }}
          POLICY_ARN: ${{ steps.iam.outputs.policy_arn }}
        run: |
          ROLE_NAME="${XRAY_ROLE_NAME}-${CLUSTER_NAME}"
          eksctl create iamserviceaccount \
            --name "${COLLECTOR_SA_NAME}" \
            --namespace "${NAMESPACE}" \
            --cluster "${CLUSTER_NAME}" \
            --region "${REGION}" \
            --attach-policy-arn "${POLICY_ARN}" \
            --role-name "${ROLE_NAME}" \
            --approve \
            --override-existing-serviceaccounts

      - name: Adopt IRSA service account for Helm
        run: |
          kubectl annotate serviceaccount "${COLLECTOR_SA_NAME}" \
            -n "${NAMESPACE}" \
            meta.helm.sh/release-name=otel-demo \
            meta.helm.sh/release-namespace="${NAMESPACE}" \
            --overwrite
          kubectl label serviceaccount "${COLLECTOR_SA_NAME}" \
            -n "${NAMESPACE}" \
            app.kubernetes.io/managed-by=Helm \
            --overwrite

      - name: Deploy OpenTelemetry Demo
        env:
          REGION: ${{ inputs.region }}
          VALUES_FILE: ${{ inputs.values_file }}
        run: |
          helm repo add open-telemetry https://open-telemetry.github.io/opentelemetry-helm-charts
          helm repo update

          # Reject path traversal / absolute paths so an attacker can't point this
          # at an arbitrary file outside the repo (defense-in-depth; workflow_dispatch
          # already requires write access).
          case "${VALUES_FILE}" in
            /*|*..*) echo "Invalid values_file: ${VALUES_FILE}"; exit 1 ;;
          esac

          # Update region placeholder in the chosen values file
          sed -i "s/us-east-1/${REGION}/g" "${VALUES_FILE}"

          helm upgrade --install otel-demo open-telemetry/opentelemetry-demo \
            --namespace "${NAMESPACE}" \
            --create-namespace \
            -f "${VALUES_FILE}" \
            --wait \
            --timeout 10m

      - name: Print access info
        run: |
          echo "============================================"
          echo " Deployment complete!"
          echo "============================================"
          echo ""
          echo "Configure kubectl:"
          echo "  aws eks update-kubeconfig --name ${{ inputs.cluster_name }} --region ${{ inputs.region }}"
          echo ""
          echo "Access frontend:"
          echo "  kubectl port-forward -n ${NAMESPACE} svc/otel-demo-frontend-proxy 8080:8080"
          echo ""
          echo "X-Ray console:"
          echo "  https://${{ inputs.region }}.console.aws.amazon.com/xray/home?region=${{ inputs.region }}#/traces"

  destroy:
    if: github.event.inputs.action == 'destroy'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.region }}

      - name: Install eksctl
        run: |
          ARCH=amd64
          PLATFORM=$(uname -s)_$ARCH
          curl -sLO "https://github.com/eksctl-io/eksctl/releases/latest/download/eksctl_$PLATFORM.tar.gz"
          tar -xzf eksctl_$PLATFORM.tar.gz -C /tmp
          sudo mv /tmp/eksctl /usr/local/bin

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name "${{ inputs.cluster_name }}" \
            --region "${{ inputs.region }}"

      - name: Uninstall Helm release
        run: |
          helm uninstall otel-demo --namespace "${NAMESPACE}" || true
          kubectl delete namespace "${NAMESPACE}" --wait=true || true

      - name: Delete IRSA
        run: |
          eksctl delete iamserviceaccount \
            --name "${COLLECTOR_SA_NAME}" \
            --namespace "${NAMESPACE}" \
            --cluster "${{ inputs.cluster_name }}" \
            --region "${{ inputs.region }}" || true

      - name: Delete IAM policy
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          POLICY_ARN="arn:aws:iam::${ACCOUNT_ID}:policy/${XRAY_POLICY_NAME}"
          aws iam delete-policy --policy-arn "${POLICY_ARN}" || true

      - name: Delete EKS cluster
        run: |
          eksctl delete cluster \
            --name "${{ inputs.cluster_name }}" \
            --region "${{ inputs.region }}" \
            --wait

      - name: Confirm cleanup
        run: echo "All resources destroyed successfully."
